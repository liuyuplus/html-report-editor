        const step = event.shiftKey ? 10 : 1;
        const moves = {
          ArrowLeft: [-step, 0],
          ArrowRight: [step, 0],
          ArrowUp: [0, -step],
          ArrowDown: [0, step]
        };
        if (moves[key]) {
          event.preventDefault();
          nudgeSelectedElement(moves[key][0], moves[key][1]);
        }
      }

      function normalizeCssSize(value) {
        const trimmed = String(value || "").trim();
        if (!trimmed || trimmed === "auto") {
          return "";
        }
        if (/^-?\d+(\.\d+)?$/.test(trimmed)) {
          return `${trimmed}px`;
        }
        return trimmed;
      }

      function colorToHex(value, fallback = "#30a46c") {
        const input = String(value || "").trim();
        if (/^#[0-9a-f]{6}$/i.test(input)) {
          return input;
        }
        if (/^#[0-9a-f]{3}$/i.test(input)) {
          return `#${input.slice(1).split("").map((char) => char + char).join("")}`;
        }
        const match = input.match(/rgba?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)(?:[,\s/]+([\d.]+))?/i);
        if (!match) {
          return fallback;
        }
        if (match[4] !== undefined && Number(match[4]) === 0) {
          return fallback;
        }
        return `#${[match[1], match[2], match[3]].map((part) => {
          return Math.max(0, Math.min(255, Number(part))).toString(16).padStart(2, "0");
        }).join("")}`;
      }

      function uniformBoxValue(computed, props) {
        const values = props.map((prop) => numberFromPx(computed[prop]));
        return values.every((value) => value === values[0]) ? (values[0] ? `${values[0]}px` : "") : "";
      }

      function readLayoutControls() {
        isReadingLayout = true;
        if (!selectedElement || !selectedElement.isConnected) {
          clearSelection();
          isReadingLayout = false;
          return;
        }

        const selectedList = selectedElementList();
        if (selectedList.length > 1) {
          const rect = unionRects(selectedList.map((el) => el.getBoundingClientRect()));
          selectedLabel.textContent = `已选择 ${selectedList.length} 个模块 · ${Math.round(rect.width)} x ${Math.round(rect.height)}`;
          selectionMeta.hidden = false;
          selectionMeta.textContent = `基准：${elementLabel(selectedElement)}（第 1 个选中模块）`;
          Object.values(layoutControls).forEach((control) => {
            setControlValue(control, "");
            control.disabled = true;
          });
          layoutControls.text.placeholder = "多选时可拖动、删除、复制、批量对齐或格式刷";
          updateSelectionOverlay();
          updateTypographyToggles();
          isReadingLayout = false;
          return;
        }

        const style = selectedElement.style;
        const computed = selectedElement.ownerDocument.defaultView.getComputedStyle(selectedElement);
        const rect = selectedElement.getBoundingClientRect();
        const canEditText = canEditTextElement(selectedElement);

        selectedLabel.textContent = `${elementLabel(selectedElement)} · ${Math.round(rect.width)} x ${Math.round(rect.height)}`;
        selectionMeta.hidden = false;
        selectionMeta.textContent = "基准：当前模块";
        Object.values(layoutControls).forEach((control) => {
          control.disabled = false;
        });
        setControlValue(layoutControls.text, canEditText ? selectedTextValue(selectedElement) : "");
        layoutControls.text.disabled = !canEditText;
        layoutControls.text.placeholder = canEditText ? "直接修改当前文字，换行会导出为 <br>" : "选中文字元素后可在这里修改";
        setControlValue(layoutControls.width, style.width || (rect.width ? `${Math.round(rect.width)}px` : ""));
        setControlValue(layoutControls.height, style.height || (rect.height ? `${Math.round(rect.height)}px` : ""));
        setControlValue(layoutControls.padding, style.padding || uniformBoxValue(computed, ["paddingTop", "paddingRight", "paddingBottom", "paddingLeft"]));
        setControlValue(layoutControls.radius, style.borderRadius || uniformBoxValue(computed, ["borderTopLeftRadius", "borderTopRightRadius", "borderBottomRightRadius", "borderBottomLeftRadius"]));
        setControlValue(layoutControls.fontSize, style.fontSize || computed.fontSize);
        setControlValue(layoutControls.textColor, colorToHex(style.color || computed.color, "#1c2024"));
        setControlValue(layoutControls.bgColor, colorToHex(style.backgroundColor || computed.backgroundColor, "#fbfefc"));
        setControlValue(layoutControls.borderColor, colorToHex(style.borderColor || computed.borderColor, "#d9d9e0"));
        setControlValue(layoutControls.borderWidth, style.borderWidth || uniformBoxValue(computed, ["borderTopWidth", "borderRightWidth", "borderBottomWidth", "borderLeftWidth"]));

        updateSelectionOverlay();
        updateTypographyToggles();
        isReadingLayout = false;
      }

      function applyLayoutControls() {
        if (isReadingLayout || !selectedElement || !selectedElement.isConnected) {
          return;
        }

        const style = selectedElement.style;
        const changed = (control) => control.value !== control.dataset.readValue;
        const hasChanges = Object.values(layoutControls).some(changed);
        if (!hasChanges) {
          return;
        }

        const focusedLayoutControl = document.activeElement && Object.values(layoutControls).includes(document.activeElement)
          ? document.activeElement
          : null;
        const layoutHistoryControl = focusedLayoutControl ? focusedLayoutControl.id : "__layout_control__";
        if (activeLayoutHistoryControl !== layoutHistoryControl) {
          pushHistory("样式调整");
          activeLayoutHistoryControl = layoutHistoryControl;
        }

        if (changed(layoutControls.text) && canEditTextElement(selectedElement)) {
          setElementText(selectedElement, layoutControls.text.value);
          layoutControls.text.dataset.readValue = layoutControls.text.value;
        }
        if (changed(layoutControls.width)) {
          style.width = normalizeCssSize(layoutControls.width.value);
          if (style.width) style.boxSizing = "border-box";
        }
        if (changed(layoutControls.height)) {
          style.height = normalizeCssSize(layoutControls.height.value);
          if (style.height) style.boxSizing = "border-box";
        }
        if (changed(layoutControls.padding)) style.padding = normalizeCssSize(layoutControls.padding.value);
        if (changed(layoutControls.radius)) style.borderRadius = normalizeCssSize(layoutControls.radius.value);
        if (changed(layoutControls.fontSize)) style.fontSize = normalizeCssSize(layoutControls.fontSize.value);
        if (changed(layoutControls.textColor)) style.color = layoutControls.textColor.value;
        if (changed(layoutControls.bgColor)) style.backgroundColor = layoutControls.bgColor.value;
        const borderColorChanged = changed(layoutControls.borderColor);
        const borderWidthChanged = changed(layoutControls.borderWidth);
        if (borderColorChanged) {
          style.borderColor = layoutControls.borderColor.value;
          const currentBorderWidth = parseFloat(selectedElement.ownerDocument.defaultView.getComputedStyle(selectedElement).borderTopWidth);
          const controlBorderWidth = parseFloat(normalizeCssSize(layoutControls.borderWidth.value));
          if (!borderWidthChanged && (!Number.isFinite(currentBorderWidth) || currentBorderWidth <= 0) && (!Number.isFinite(controlBorderWidth) || controlBorderWidth <= 0)) {
            style.borderWidth = "1px";
            style.borderStyle = "solid";
            layoutControls.borderWidth.value = "1px";
            layoutControls.borderWidth.dataset.readValue = "1px";
          }
        }
        if (changed(layoutControls.borderWidth)) {
          const borderWidth = normalizeCssSize(layoutControls.borderWidth.value);
          style.borderWidth = borderWidth;
          const numericBorderWidth = parseFloat(borderWidth);
          style.borderStyle = Number.isFinite(numericBorderWidth) && numericBorderWidth > 0 ? "solid" : "none";
        }
        recordVisualPatch(selectedElement);
        updateSelectionOverlay();
        updateTypographyToggles();
      }

      function resetSelectedLayout() {
        if (!selectedElement || !selectedElement.isConnected) {
          return;
        }
        pushHistory("清样式");
        [
          "width", "height", "boxSizing", "padding", "borderRadius", "fontSize", "fontWeight", "fontStyle",
          "textDecoration", "textDecorationLine", "color", "backgroundColor",
          "borderColor", "borderWidth", "borderStyle", "display", "gap", "flexDirection",
          "flexWrap", "justifyContent", "alignItems", "gridTemplateColumns", "order",
          "flexGrow", "flexShrink", "flexBasis"
        ].forEach((prop) => {
          selectedElement.style[prop] = "";
        });
        recordVisualPatch(selectedElement);
        readLayoutControls();
      }

      function hideFormatPainterMenu() {
        formatPainterMenu.hidden = true;
      }

      function createFormatPainterCursor(fillColor, outlineColor) {
        const fallbackSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 1170 1024"><path d="${FORMAT_PAINTER_ICON_PATH}" fill="${fillColor}" stroke="${fillColor}" stroke-width="48" stroke-linejoin="round"/></svg>`;
        try {
          const canvas = document.createElement("canvas");
          const size = 32;
          canvas.width = size;
          canvas.height = size;
          const context = canvas.getContext("2d");
          const path = new Path2D(FORMAT_PAINTER_ICON_PATH);
          context.translate(3, 2);
          context.scale(26 / 1170, 26 / 1170);
          context.lineJoin = "round";
          context.lineCap = "round";
          context.strokeStyle = fillColor;
          context.lineWidth = 56;
          context.stroke(path);
          context.fillStyle = fillColor;
          context.fill(path);
          return `url("${canvas.toDataURL("image/png")}") 7 26, copy`;
        } catch (error) {
          return `url("data:image/svg+xml,${encodeURIComponent(fallbackSvg)}") 7 26, copy`;
        }
      }

      function cssChannelValue(value) {
        const text = String(value || "").trim();
        if (text.endsWith("%")) {
          return Math.round(Math.max(0, Math.min(100, Number.parseFloat(text))) * 2.55);
        }
        return Number(text);
      }

      function cssAlphaValue(value) {
        const text = String(value || "").trim();
        if (!text) {
          return 1;
        }
        if (text.endsWith("%")) {
          return Math.max(0, Math.min(1, Number.parseFloat(text) / 100));
        }
        return Math.max(0, Math.min(1, Number(text)));
      }

      function rgbaFromHexColor(value) {
        const hex = String(value || "").replace("#", "").trim();
        if (![3, 4, 6, 8].includes(hex.length) || /[^0-9a-f]/i.test(hex)) {
          return null;
        }
        const normalized = hex.length <= 4
          ? hex.split("").map((char) => char + char).join("")
          : hex;
        const hasAlpha = normalized.length === 8;
        return {
          r: Number.parseInt(normalized.slice(0, 2), 16),
          g: Number.parseInt(normalized.slice(2, 4), 16),
          b: Number.parseInt(normalized.slice(4, 6), 16),
          a: hasAlpha ? Number.parseInt(normalized.slice(6, 8), 16) / 255 : 1
        };
      }

      function rgbaFromCssColor(value) {
        const text = String(value || "").trim();
        const match = text.match(/rgba?\(([^)]+)\)/i);
        if (!match) {
          return text.startsWith("#") ? rgbaFromHexColor(text) : null;
        }
        const parts = match[1].split(/[,\s/]+/).filter(Boolean);
        const channels = parts.slice(0, 3).map(cssChannelValue);
        if (parts.length < 3 || channels.some((part) => !Number.isFinite(part))) {
          return null;
        }
        const alpha = parts.length > 3 ? cssAlphaValue(parts[3]) : 1;
        return {
          r: Math.max(0, Math.min(255, channels[0])),
          g: Math.max(0, Math.min(255, channels[1])),
          b: Math.max(0, Math.min(255, channels[2])),
          a: Number.isFinite(alpha) ? alpha : 1
        };
      }

      function colorsFromCssValue(value) {
        const text = String(value || "");
        const colors = [];
        text.replace(/rgba?\([^)]+\)/gi, (match) => {
          const color = rgbaFromCssColor(match);
          if (color && color.a > 0.05) {
            colors.push(color);
          }
          return match;
        });
        text.replace(/#[0-9a-f]{3,8}\b/gi, (match) => {
          const color = rgbaFromHexColor(match);
          if (color && color.a > 0.05) {
            colors.push(color);
          }
          return match;
        });
        return colors;
      }

      function averageColor(colors) {
        if (!colors.length) {
          return null;
        }
        const totalAlpha = colors.reduce((sum, color) => sum + color.a, 0) || colors.length;
        return colors.reduce((mixed, color) => {
          const weight = color.a / totalAlpha;
          mixed.r += color.r * weight;
          mixed.g += color.g * weight;
          mixed.b += color.b * weight;
          mixed.a = Math.max(mixed.a, color.a);
          return mixed;
        }, { r: 0, g: 0, b: 0, a: 0 });
      }

      function colorLuminance(color) {
        const channel = (value) => {
          const normalized = value / 255;
          return normalized <= 0.03928 ? normalized / 12.92 : ((normalized + 0.055) / 1.055) ** 2.4;
        };
        return 0.2126 * channel(color.r) + 0.7152 * channel(color.g) + 0.0722 * channel(color.b);
      }

      function visibleBackgroundColorFrom(el, win) {
        let node = el;
        while (node && node.nodeType === 1) {
          const style = win.getComputedStyle(node);
          const color = rgbaFromCssColor(style.backgroundColor) || averageColor(colorsFromCssValue(style.backgroundImage));
          if (color && color.a > 0.05) {
            return color;
          }
          node = node.parentElement;
        }
        return null;
      }

      function inferredToneFromTextColor(el, win) {
        let node = el;
        while (node && node.nodeType === 1) {
          const color = rgbaFromCssColor(win.getComputedStyle(node).color);
          if (color && color.a > 0.05) {
            const luminance = colorLuminance(color);
            if (luminance > 0.68) {
              return "dark";
            }
            if (luminance < 0.28) {
              return "light";
            }
          }
          node = node.parentElement;
        }
        return null;
      }

      function formatPainterToneFromCandidate(candidate, win) {
        if (!candidate) {
          return null;
        }
        const background = visibleBackgroundColorFrom(candidate, win);
        if (background) {
          return colorLuminance(background) < FORMAT_PAINTER_DARK_BACKGROUND_LUMINANCE ? "dark" : "light";
        }
        return inferredToneFromTextColor(candidate, win);
      }

      function formatPainterToneForPoint(doc, clientX, clientY) {
        const win = doc && doc.defaultView;
        if (!doc || !win) {
          return "light";
        }
        const candidates = [];
        const pointElement = doc.elementFromPoint ? doc.elementFromPoint(clientX, clientY) : null;
        if (pointElement) {
          candidates.push(pointElement);
        }
        candidates.push(doc.body, doc.documentElement);

        for (const candidate of candidates) {
          const tone = formatPainterToneFromCandidate(candidate, win);
          if (tone) {
            return tone;
          }
        }
        return "light";
      }

      function formatPainterToneForDoc(doc) {
        const win = doc && doc.defaultView;
        if (!doc || !win) {
          return "light";
        }
        const candidates = [];
        if (lastFormatPainterPoint && lastFormatPainterPoint.doc === doc) {
          const pointed = doc.elementFromPoint
            ? doc.elementFromPoint(lastFormatPainterPoint.x, lastFormatPainterPoint.y)
            : null;
          if (pointed) {
            candidates.push(pointed);
          }
        }
        const pointElement = doc.elementFromPoint
          ? doc.elementFromPoint(Math.max(1, win.innerWidth / 2), Math.max(1, win.innerHeight / 2))
          : null;
        if (pointElement) {
          candidates.push(pointElement);
        }
        candidates.push(doc.body, doc.documentElement);
        if (selectedElement && selectedElement.ownerDocument === doc) {
          candidates.push(selectedElement);
        }

        for (const candidate of candidates) {
          const tone = formatPainterToneFromCandidate(candidate, win);
          if (tone) {
            return tone;
          }
        }
        return "light";
      }

      function updateFormatPainterCursor(preferredTone) {
        const active = Boolean(formatPainterState);
        const doc = previewFrame.contentDocument;
        const tone = active ? (preferredTone || formatPainterToneForDoc(doc)) : "light";
        const cursor = tone === "dark" ? FORMAT_PAINTER_CURSOR_LIGHT : FORMAT_PAINTER_CURSOR_DARK;
        formatPainterCursorTone = tone;
        document.body.classList.toggle("is-format-painting", active);
        document.body.dataset.formatPainterTone = tone;
        document.body.style.setProperty("--format-painter-cursor", active ? cursor : FORMAT_PAINTER_CURSOR_DARK);
        if (doc && doc.documentElement) {
          if (active) {
            doc.documentElement.setAttribute("data-html-report-live-editor-format-painting", "true");
            doc.documentElement.setAttribute("data-html-report-live-editor-format-painting-tone", tone);
            doc.documentElement.style.setProperty("cursor", cursor, "important");
          } else {
            doc.documentElement.removeAttribute("data-html-report-live-editor-format-painting");
            doc.documentElement.removeAttribute("data-html-report-live-editor-format-painting-tone");
            doc.documentElement.style.removeProperty("cursor");
          }
        }
      }

      function rememberFormatPainterPoint(doc, clientX, clientY) {
        lastFormatPainterPoint = { doc, x: clientX, y: clientY };
        refreshFormatPainterCursorAtPoint(doc, clientX, clientY);
      }

      function refreshFormatPainterCursorFromFrameEvent(event) {
        if (!formatPainterState) {
          return;
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement) {
          return;
        }
        const rect = previewFrame.getBoundingClientRect();
        rememberFormatPainterPoint(doc, event.clientX - rect.left, event.clientY - rect.top);
      }

      function refreshFormatPainterCursorAtPoint(doc, clientX, clientY) {
        if (!formatPainterState) {
          return;
        }
        const tone = formatPainterToneForPoint(doc, clientX, clientY);
        if (tone !== formatPainterCursorTone) {
          updateFormatPainterCursor(tone);
        }
      }

      function setFormatPainterActive(state) {
        formatPainterState = state;
        formatPainterButton.classList.toggle("is-active", Boolean(state));
        formatPainterButton.setAttribute("aria-pressed", String(Boolean(state)));
        updateFormatPainterCursor();
      }

      function stopFormatPainter() {
        setFormatPainterActive(null);
        hideFormatPainterMenu();
      }

      function formatPainterModeLabel(mode) {
        return mode === "size" ? "仅尺寸" : "完整格式";
      }

      function formatPainterTargetsFromSelection(source) {
        return selectedElementList().filter((el) => el !== source && el.isConnected);
      }

      function captureElementFormat(source, mode) {
        const computed = source.ownerDocument.defaultView.getComputedStyle(source);
        const rect = source.getBoundingClientRect();
        const format = {
          mode,
          width: `${Math.round(rect.width)}px`,
          height: `${Math.round(rect.height)}px`
        };

        if (mode === "full") {
          format.styles = {
            boxSizing: "border-box",
            paddingTop: computed.paddingTop,
            paddingRight: computed.paddingRight,
            paddingBottom: computed.paddingBottom,
            paddingLeft: computed.paddingLeft,
            borderTopLeftRadius: computed.borderTopLeftRadius,
            borderTopRightRadius: computed.borderTopRightRadius,
            borderBottomRightRadius: computed.borderBottomRightRadius,
            borderBottomLeftRadius: computed.borderBottomLeftRadius,
            borderTopWidth: computed.borderTopWidth,
            borderRightWidth: computed.borderRightWidth,
            borderBottomWidth: computed.borderBottomWidth,
            borderLeftWidth: computed.borderLeftWidth,
            borderTopStyle: computed.borderTopStyle,
            borderRightStyle: computed.borderRightStyle,
            borderBottomStyle: computed.borderBottomStyle,
            borderLeftStyle: computed.borderLeftStyle,
            borderTopColor: computed.borderTopColor,
            borderRightColor: computed.borderRightColor,
            borderBottomColor: computed.borderBottomColor,
            borderLeftColor: computed.borderLeftColor,
            color: computed.color,
            backgroundColor: computed.backgroundColor,
            fontFamily: computed.fontFamily,
            fontSize: computed.fontSize,
            fontWeight: computed.fontWeight,
            fontStyle: computed.fontStyle,
            textDecorationLine: computed.textDecorationLine,
            lineHeight: computed.lineHeight,
            letterSpacing: computed.letterSpacing,
            textAlign: computed.textAlign,
            boxShadow: computed.boxShadow
          };
        }

        return format;
      }

      function applyElementFormat(target, format) {
        if (!target || !target.isConnected || !format) {
          return false;
        }
        const style = target.style;
        style.width = format.width;
        style.height = format.height;
        style.boxSizing = "border-box";

        if (format.mode === "full" && format.styles) {
          Object.entries(format.styles).forEach(([prop, value]) => {
            style[prop] = value;
          });
        }
        recordVisualPatch(target);
        return true;
      }

      function applyFormatPainter(source, targets, mode) {
        const validTargets = targets.filter((target) => target && target.isConnected && target !== source && canSelectElement(target));
        if (!source || !source.isConnected || !validTargets.length) {
          showToast("请选择要应用格式的目标模块。", true);
          return false;
        }

        const format = captureElementFormat(source, mode);
        pushHistory(mode === "size" ? "尺寸刷" : "格式刷");
        const changed = validTargets.map((target) => applyElementFormat(target, format)).some(Boolean);
        if (changed) {
          syncSourceFromPreview();
          refreshSelectionMarkers();
          updateSelectionOverlay();
          readLayoutControls();
          showToast(`已应用${formatPainterModeLabel(mode)}。`);
        }
        return changed;
      }

      function beginFormatPainter(mode = "full") {
        hideFormatPainterMenu();
        const source = selectedElement;
        if (!source || !source.isConnected) {
          showToast("请先选中一个源模块。", true);
          return;
        }

        const targets = formatPainterTargetsFromSelection(source);
        if (targets.length) {
          applyFormatPainter(source, targets, mode);
          stopFormatPainter();
          return;
        }

        setFormatPainterActive({ source, mode });
        showToast(`已取样${formatPainterModeLabel(mode)}，点击目标模块应用，按 Esc 退出。`);
      }

      function applyActiveFormatPainter(target) {
        if (!formatPainterState) {
          return false;
        }
        const source = formatPainterState.source;
        if (!source || !source.isConnected) {
          stopFormatPainter();
          showToast("格式刷源模块已不存在。", true);
          return true;
        }
        if (!target || target === source) {
          showToast("请选择另一个目标模块。", true);
          return true;
        }
        applyFormatPainter(source, [target], formatPainterState.mode);
        return true;
      }

      function applyBatchLayout(action) {
        const selectedList = selectedElementList();
        if (selectedList.length < 2 || !selectedElement || !selectedElement.isConnected) {
          showToast("请先按 Command 或 Shift 多选至少两个模块。", true);
          return;
        }

        const anchor = selectedElement;
        const anchorRect = anchor.getBoundingClientRect();
        pushHistory("批量排版");

        selectedList.forEach((el) => {
          if (el === anchor || !el.isConnected) {
            return;
          }
          const rect = el.getBoundingClientRect();
          if (action === "left") {
            moveElementByDelta(el, anchorRect.left - rect.left, 0);
          } else if (action === "centerX") {
            moveElementByDelta(el, anchorRect.left + anchorRect.width / 2 - (rect.left + rect.width / 2), 0);
          } else if (action === "right") {
            moveElementByDelta(el, anchorRect.right - rect.right, 0);
          } else if (action === "top") {
            moveElementByDelta(el, 0, anchorRect.top - rect.top);
          } else if (action === "centerY") {
            moveElementByDelta(el, 0, anchorRect.top + anchorRect.height / 2 - (rect.top + rect.height / 2));
          } else if (action === "bottom") {
            moveElementByDelta(el, 0, anchorRect.bottom - rect.bottom);
          } else if (action === "width" || action === "size") {
            el.style.width = `${Math.round(anchorRect.width)}px`;
            el.style.boxSizing = "border-box";
            recordVisualPatch(el);
          }
          if (action === "height" || action === "size") {
            el.style.height = `${Math.round(anchorRect.height)}px`;
            el.style.boxSizing = "border-box";
            recordVisualPatch(el);
          }
        });

        refreshSelectionMarkers();
        updateSelectionOverlay();
        syncSourceFromPreview();
        readLayoutControls();
      }

      function applyDistribution(axis) {
        const selectedList = selectedElementList();
        if (selectedList.length < 3) {
          showToast("等距分布至少需要选择三个模块。", true);
          return;
        }

        const items = selectedList.map((el) => {
          const rect = el.getBoundingClientRect();
          return { el, rect };
        }).sort((a, b) => {
          return axis === "x" ? a.rect.left - b.rect.left : a.rect.top - b.rect.top;
        });

        const first = items[0];
        const last = items[items.length - 1];
        const span = axis === "x"
          ? last.rect.right - first.rect.left
          : last.rect.bottom - first.rect.top;
        const totalSize = items.reduce((sum, item) => {
          return sum + (axis === "x" ? item.rect.width : item.rect.height);
        }, 0);
        const gap = items.length > 1 ? (span - totalSize) / (items.length - 1) : 0;

        pushHistory(axis === "x" ? "水平等距分布" : "垂直等距分布");

        let cursor = axis === "x" ? first.rect.left : first.rect.top;
        items.forEach((item, index) => {
          if (index > 0 && index < items.length - 1) {
            const delta = cursor - (axis === "x" ? item.rect.left : item.rect.top);
            if (axis === "x") {
              moveElementByDelta(item.el, delta, 0);
            } else {
              moveElementByDelta(item.el, 0, delta);
            }
          }
          cursor += (axis === "x" ? item.rect.width : item.rect.height) + gap;
        });

        refreshSelectionMarkers();
        updateSelectionOverlay();
        syncSourceFromPreview();
        readLayoutControls();
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function normalizeGuideRect(rect) {
        const left = Number(rect.left) || 0;
        const top = Number(rect.top) || 0;
        const width = Math.max(0, Number(rect.width) || 0);
        const height = Math.max(0, Number(rect.height) || 0);
        return {
          left,
          top,
          width,
          height,
          right: left + width,
          bottom: top + height,
          centerX: left + width / 2,
          centerY: top + height / 2
        };
      }

      function unionRects(rects) {
        const valid = rects.filter((rect) => rect && rect.width >= 0 && rect.height >= 0);
        if (!valid.length) {
          return normalizeGuideRect({ left: 0, top: 0, width: 0, height: 0 });
        }
        const left = Math.min(...valid.map((rect) => rect.left));
        const top = Math.min(...valid.map((rect) => rect.top));
        const right = Math.max(...valid.map((rect) => rect.right));
        const bottom = Math.max(...valid.map((rect) => rect.bottom));
        return normalizeGuideRect({ left, top, width: right - left, height: bottom - top });
      }

      function ensureSmartGuideOverlay(doc) {
        let overlay = doc.getElementById("__html_report_smart_guides");
        if (overlay) {
          return overlay;
        }
        overlay = doc.createElement("div");
        overlay.id = "__html_report_smart_guides";
        overlay.setAttribute("data-html-report-live-editor", "smart-guides");
        doc.body.appendChild(overlay);
        return overlay;
      }

      function hideSmartGuides(doc) {
        const targetDoc = doc || (selectedElement && selectedElement.ownerDocument);
        const overlay = targetDoc ? targetDoc.getElementById("__html_report_smart_guides") : null;
        if (overlay) {
          overlay.style.display = "none";
          overlay.replaceChildren();
        }
      }

      function appendGuideLabel(doc, overlay, guide) {
        if (!guide.label) {
          return;
        }
        const label = doc.createElement("div");
        label.className = "__html_report_guide_label";
        label.textContent = guide.label;
        label.style.left = `${Math.round(guide.labelX)}px`;
        label.style.top = `${Math.round(guide.labelY)}px`;
        overlay.appendChild(label);
      }

      function renderSmartGuides(doc, guides) {
        const overlay = ensureSmartGuideOverlay(doc);
        overlay.replaceChildren();
        if (!guides || !guides.length) {
          overlay.style.display = "none";
          return;
        }

        guides.forEach((guide) => {
          const line = doc.createElement("div");
          line.className = `__html_report_guide_line is-${guide.orientation}`;
          if (guide.orientation === "vertical") {
            const y1 = Math.min(guide.y1, guide.y2);
            const y2 = Math.max(guide.y1, guide.y2);
            line.style.left = `${Math.round(guide.x)}px`;
            line.style.top = `${Math.round(y1)}px`;
            line.style.height = `${Math.max(1, Math.round(y2 - y1))}px`;
          } else {
            const x1 = Math.min(guide.x1, guide.x2);
            const x2 = Math.max(guide.x1, guide.x2);
            line.style.left = `${Math.round(x1)}px`;
            line.style.top = `${Math.round(guide.y)}px`;
            line.style.width = `${Math.max(1, Math.round(x2 - x1))}px`;
          }
          overlay.appendChild(line);
          appendGuideLabel(doc, overlay, guide);
        });

        overlay.style.display = "block";
      }

      function addGuideCandidate(set, node) {
        if (node && node.nodeType === Node.ELEMENT_NODE) {
          set.add(node);
        }
      }

      function smartGuideScope(el) {
        return el.closest(".slide, [data-screen-label], .page, .dashboard, main, section, article") || el.ownerDocument.body;
      }

      function isTextOnlyGuideCandidate(node, win) {
        if (!node || !node.textContent || !node.textContent.trim()) {
          return false;
        }
        if (hasVisibleBoxChrome(node, win, { ignoreEditorChrome: true })) {
          return false;
        }
        if (node.querySelector && node.querySelector("img, svg, canvas, video, audio, iframe, object, embed")) {
          return false;
        }
        return canEditTextElement(node);
      }

      function guideCandidateMode(el) {
        const win = el && el.ownerDocument ? el.ownerDocument.defaultView : null;
        return isTextOnlyGuideCandidate(el, win) ? "text" : "box";
      }

      function isGuideCandidateShape(node, win, mode = "box") {
        if (!node || !canSelectElement(node) || !isVisibleElement(node, win)) {
          return false;
        }
        const style = win.getComputedStyle(node);
        if (["inline", "contents", "none"].includes(style.display)) {
          return false;
        }
        const rect = node.getBoundingClientRect();
        if (rect.width < 8 || rect.height < 8) {
          return false;
        }
        if (mode === "box" && isTextOnlyGuideCandidate(node, win)) {
          return false;
        }
        return true;
      }

      function smartGuideCandidates(el, ignored = new Set()) {
        const doc = el.ownerDocument;
        const win = doc.defaultView;
        const mode = guideCandidateMode(el);
        const candidates = new Set();
        const addChildren = (parent) => {
          if (!parent || !parent.children) {
            return;
          }
          [...parent.children].forEach((node) => addGuideCandidate(candidates, node));
        };

        const scope = smartGuideScope(el);
        addChildren(el.parentElement);
        addChildren(scope);
        if (scope) {
          [...scope.querySelectorAll("*")].forEach((node) => {
            if (isGuideCandidateShape(node, win, mode)) {
              addGuideCandidate(candidates, node);
            }
          });
        }

        const classNames = [...el.classList].slice(0, 4);
        if (scope && classNames.length) {
          [...scope.querySelectorAll("*")].forEach((node) => {
            if (classNames.some((name) => node.classList && node.classList.contains(name))) {
              addGuideCandidate(candidates, node);
            }
          });
        }

        return [...candidates].filter((node) => {
          if (ignored.has(node) || node === el || node.contains(el) || el.contains(node) || !canSelectElement(node)) {
            return false;
          }
          for (const ignoredNode of ignored) {
            if (node.contains(ignoredNode) || ignoredNode.contains(node)) {
              return false;
            }
          }
          if (node.closest("#__html_report_resize_overlay, #__html_report_multi_select_overlay, #__html_report_smart_guides")) {
            return false;
          }
          if (!isGuideCandidateShape(node, win, mode)) {
            return false;
          }
          const rect = node.getBoundingClientRect();
          return rect.width >= 4 && rect.height >= 4;
        }).sort((a, b) => {
          const aRect = a.getBoundingClientRect();
          const bRect = b.getBoundingClientRect();
          const aSibling = a.parentElement === el.parentElement ? 1 : 0;
          const bSibling = b.parentElement === el.parentElement ? 1 : 0;
          if (aSibling !== bSibling) return bSibling - aSibling;
          return (bRect.width * bRect.height) - (aRect.width * aRect.height);
        }).slice(0, 800);
      }

      function guideAlignmentLabel(axis, source, target) {
        if (axis === "x") {
          if (source === "centerX" && target === "centerX") return "中心对齐";
          if (source === "left" && target === "left") return "左对齐";
          if (source === "right" && target === "right") return "右对齐";
          return "竖向对齐";
        }
        if (source === "centerY" && target === "centerY") return "中线对齐";
        if (source === "top" && target === "top") return "顶对齐";
        if (source === "bottom" && target === "bottom") return "底对齐";
        return "横向对齐";
      }

      function considerGuideMatch(best, delta, guide) {
        const distance = Math.abs(delta);
        if (distance > SMART_GUIDE_TOLERANCE) {
          return best;
        }
        if (!best || distance < best.distance) {
          return { distance, delta, guide };
        }
        return best;
      }

      function dedupeGuides(guides) {
        const seen = new Set();
        return guides.filter((guide) => {
          const key = guide.orientation === "vertical"
            ? `${guide.orientation}:${Math.round(guide.x)}:${guide.label}`
            : `${guide.orientation}:${Math.round(guide.y)}:${guide.label}`;
          if (seen.has(key)) {
            return false;
          }
          seen.add(key);
          return true;
        }).slice(0, 8);
      }

      function alignmentGuidesForRect(rect, targetRects, axes = { x: true, y: true }) {
        const xSources = ["left", "centerX", "right"];
        const ySources = ["top", "centerY", "bottom"];
        const guides = [];

        targetRects.forEach((target) => {
          if (axes.x) {
            xSources.forEach((sourceKey) => {
              xSources.forEach((targetKey) => {
                const targetX = target[targetKey];
                if (Math.abs(targetX - rect[sourceKey]) <= SMART_GUIDE_TOLERANCE) {
                  const y1 = Math.min(rect.top, target.top);
                  const y2 = Math.max(rect.bottom, target.bottom);
                  guides.push({
                    orientation: "vertical",
                    x: targetX,
                    y1,
                    y2,
                    label: guideAlignmentLabel("x", sourceKey, targetKey),
                    labelX: targetX,
                    labelY: (y1 + y2) / 2
                  });
                }
              });
            });
          }
          if (axes.y) {
            ySources.forEach((sourceKey) => {
              ySources.forEach((targetKey) => {
                const targetY = target[targetKey];
                if (Math.abs(targetY - rect[sourceKey]) <= SMART_GUIDE_TOLERANCE) {
                  const x1 = Math.min(rect.left, target.left);
                  const x2 = Math.max(rect.right, target.right);
                  guides.push({
                    orientation: "horizontal",
                    y: targetY,
                    x1,
                    x2,
                    label: guideAlignmentLabel("y", sourceKey, targetKey),
                    labelX: (x1 + x2) / 2,
                    labelY: targetY
                  });
                }
              });
            });
          }
        });

        return dedupeGuides(guides);
      }

      function smartGuidesForMove(el, rawRect, disabled, ignored = new Set()) {
        const rect = normalizeGuideRect(rawRect);
        if (disabled) {
          return { rect, guides: [] };
        }

        const xSources = ["left", "centerX", "right"];
        const ySources = ["top", "centerY", "bottom"];
        let bestX = null;
        let bestY = null;
        const targetRects = smartGuideCandidates(el, ignored).map((candidate) => {
          return normalizeGuideRect(candidate.getBoundingClientRect());
        });

        targetRects.forEach((target) => {
          xSources.forEach((sourceKey) => {
            xSources.forEach((targetKey) => {
              const targetX = target[targetKey];
              const delta = targetX - rect[sourceKey];
              bestX = considerGuideMatch(bestX, delta, {
                orientation: "vertical",
                x: targetX,
                y1: Math.min(rect.top, target.top),
                y2: Math.max(rect.bottom, target.bottom),
                label: guideAlignmentLabel("x", sourceKey, targetKey),
                labelX: targetX,
                labelY: (Math.min(rect.top, target.top) + Math.max(rect.bottom, target.bottom)) / 2
              });
            });
          });
          ySources.forEach((sourceKey) => {
            ySources.forEach((targetKey) => {
              const targetY = target[targetKey];
              const delta = targetY - rect[sourceKey];
              bestY = considerGuideMatch(bestY, delta, {
                orientation: "horizontal",
                y: targetY,
                x1: Math.min(rect.left, target.left),
                x2: Math.max(rect.right, target.right),
                label: guideAlignmentLabel("y", sourceKey, targetKey),
                labelX: (Math.min(rect.left, target.left) + Math.max(rect.right, target.right)) / 2,
                labelY: targetY
              });
            });
          });
        });

        const snapped = normalizeGuideRect({
          left: rect.left + (bestX ? bestX.delta : 0),
          top: rect.top + (bestY ? bestY.delta : 0),
          width: rect.width,
          height: rect.height
        });
        return {
          rect: snapped,
          guides: alignmentGuidesForRect(snapped, targetRects)
        };
      }

      function smartGuidesForResize(el, rawRect, handle, positioned, disabled, ignored = new Set()) {
        let rect = normalizeGuideRect(rawRect);
        if (disabled) {
          return { rect, guides: [] };
        }

        let bestWidth = null;
        let bestHeight = null;
        let bestEdgeX = null;
        let bestEdgeY = null;
        const canResizeWidth = handle.includes("e") || handle.includes("w");
        const canResizeHeight = handle.includes("n") || handle.includes("s");
        const targetRects = smartGuideCandidates(el, ignored).map((candidate) => {
          return normalizeGuideRect(candidate.getBoundingClientRect());
        });
        targetRects.forEach((target) => {
          if (canResizeWidth) {
            bestWidth = considerGuideMatch(bestWidth, target.width - rect.width, { target });
            const sourceKey = handle.includes("w") ? "left" : "right";
            ["left", "centerX", "right"].forEach((targetKey) => {
              bestEdgeX = considerGuideMatch(bestEdgeX, target[targetKey] - rect[sourceKey], { target, targetKey });
            });
          }
          if (canResizeHeight) {
            bestHeight = considerGuideMatch(bestHeight, target.height - rect.height, { target });
            const sourceKey = handle.includes("n") ? "top" : "bottom";
            ["top", "centerY", "bottom"].forEach((targetKey) => {
              bestEdgeY = considerGuideMatch(bestEdgeY, target[targetKey] - rect[sourceKey], { target, targetKey });
            });
          }
        });

        const guides = [];
        if (bestEdgeX) {
          if (handle.includes("w")) {
            const nextLeft = rect.left + bestEdgeX.delta;
            rect = normalizeGuideRect({ left: nextLeft, top: rect.top, width: rect.right - nextLeft, height: rect.height });
          } else {
            rect = normalizeGuideRect({ left: rect.left, top: rect.top, width: rect.width + bestEdgeX.delta, height: rect.height });
          }
        }
        if (bestEdgeY) {
          if (handle.includes("n")) {
            const nextTop = rect.top + bestEdgeY.delta;
            rect = normalizeGuideRect({ left: rect.left, top: nextTop, width: rect.width, height: rect.bottom - nextTop });
          } else {
            rect = normalizeGuideRect({ left: rect.left, top: rect.top, width: rect.width, height: rect.height + bestEdgeY.delta });
          }
        }
        if (bestWidth) {
          const nextWidth = Math.max(12, bestWidth.guide.target.width);
          const nextLeft = handle.includes("w") && positioned ? rect.right - nextWidth : rect.left;
          rect = normalizeGuideRect({ left: nextLeft, top: rect.top, width: nextWidth, height: rect.height });
          const guideY = Math.max(6, rect.top - 10);
          guides.push({
            orientation: "horizontal",
            y: guideY,
            x1: rect.left,
            x2: rect.right,
            label: `同宽 ${Math.round(nextWidth)}px`,
            labelX: rect.centerX,
            labelY: guideY
          });
        }

        if (bestHeight) {
          const nextHeight = Math.max(12, bestHeight.guide.target.height);
          const nextTop = handle.includes("n") && positioned ? rect.bottom - nextHeight : rect.top;
          rect = normalizeGuideRect({ left: rect.left, top: nextTop, width: rect.width, height: nextHeight });
          const guideX = Math.max(6, rect.left - 10);
          guides.push({
            orientation: "vertical",
            x: guideX,
            y1: rect.top,
            y2: rect.bottom,
            label: `同高 ${Math.round(nextHeight)}px`,
            labelX: guideX,
            labelY: rect.centerY
          });
        }

        if (rect.width < 12) {
          rect = normalizeGuideRect({
            left: handle.includes("w") && positioned ? rect.right - 12 : rect.left,
            top: rect.top,
            width: 12,
            height: rect.height
          });
        }
        if (rect.height < 12) {
          rect = normalizeGuideRect({
            left: rect.left,
            top: handle.includes("n") && positioned ? rect.bottom - 12 : rect.top,
            width: rect.width,
            height: 12
          });
        }

        return {
          rect,
          guides: dedupeGuides([
            ...guides,
            ...alignmentGuidesForRect(rect, targetRects, { x: canResizeWidth, y: canResizeHeight })
          ])
        };
      }

      function ensureResizeOverlay(doc) {
        let overlay = doc.getElementById("__html_report_resize_overlay");
        if (overlay) {
          return overlay;
        }

        overlay = doc.createElement("div");
        overlay.id = "__html_report_resize_overlay";
        overlay.setAttribute("data-html-report-live-editor", "resize-overlay");
        overlay.innerHTML = ["nw", "n", "ne", "e", "se", "s", "sw", "w"].map((handle) => {
          return `<span class="__html_report_resize_handle" data-handle="${handle}"></span>`;
        }).join("");
        overlay.addEventListener("pointerdown", (event) => {
          const handle = event.target && event.target.dataset ? event.target.dataset.handle : "";
          if (handle) {
            startResize(handle, event);
          }
        }, true);
        doc.body.appendChild(overlay);
        return overlay;
      }

      function ensureMultiSelectOverlay(doc) {
        let overlay = doc.getElementById("__html_report_multi_select_overlay");
        if (overlay) {
          return overlay;
        }
        overlay = doc.createElement("div");
        overlay.id = "__html_report_multi_select_overlay";
        overlay.setAttribute("data-html-report-live-editor", "multi-select-overlay");
        doc.body.appendChild(overlay);
        return overlay;
      }

      function hideMultiSelectOverlay(doc) {
        const targetDoc = doc || (selectedElement && selectedElement.ownerDocument);
        const overlay = targetDoc ? targetDoc.getElementById("__html_report_multi_select_overlay") : null;
        if (overlay) {
          overlay.style.display = "none";
        }
      }

      function hideResizeOverlay(doc) {
        const targetDoc = doc || (selectedElement && selectedElement.ownerDocument);
        const overlay = targetDoc ? targetDoc.getElementById("__html_report_resize_overlay") : null;
        if (overlay) {
          overlay.style.display = "none";
        }
        hideMultiSelectOverlay(targetDoc);
        hideSmartGuides(targetDoc);
      }

      function updateSelectionOverlay() {
        if (!selectedElement || !selectedElement.isConnected || previewMode !== "edit") {
          hideResizeOverlay();
          return;
        }

        const doc = selectedElement.ownerDocument;
        const selectedList = selectedElementList();
        if (selectedList.length > 1) {
          const sourceRect = selectedElement.getBoundingClientRect();
          const sourceOverlay = ensureResizeOverlay(doc);
          sourceOverlay.classList.add("is-format-source");
          sourceOverlay.style.display = sourceRect.width < 1 || sourceRect.height < 1 ? "none" : "block";
          sourceOverlay.style.left = `${Math.round(sourceRect.left)}px`;
          sourceOverlay.style.top = `${Math.round(sourceRect.top)}px`;
          sourceOverlay.style.width = `${Math.round(sourceRect.width)}px`;
          sourceOverlay.style.height = `${Math.round(sourceRect.height)}px`;
          const rect = unionRects(selectedList.map((el) => el.getBoundingClientRect()));
          const overlay = ensureMultiSelectOverlay(doc);
          overlay.style.display = "block";
          overlay.style.left = `${Math.round(rect.left)}px`;
          overlay.style.top = `${Math.round(rect.top)}px`;
          overlay.style.width = `${Math.round(rect.width)}px`;
          overlay.style.height = `${Math.round(rect.height)}px`;
          updateTextOverlayPosition();
          return;
        }
        hideMultiSelectOverlay(doc);
        const rect = selectedElement.getBoundingClientRect();
        const overlay = ensureResizeOverlay(doc);
        overlay.classList.remove("is-format-source");
        if (rect.width < 1 || rect.height < 1) {
          overlay.style.display = "none";
          return;
        }

        overlay.style.display = "block";
        overlay.style.left = `${Math.round(rect.left)}px`;
        overlay.style.top = `${Math.round(rect.top)}px`;
        overlay.style.width = `${Math.round(rect.width)}px`;
        overlay.style.height = `${Math.round(rect.height)}px`;
        updateTextOverlayPosition();
      }

      function startResize(handle, event) {
        if (!selectedElement || !selectedElement.isConnected) {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        const el = selectedElement;
        const doc = el.ownerDocument;
        const win = doc.defaultView;
        const rect = el.getBoundingClientRect();
        const computed = win.getComputedStyle(el);
        const positioned = computed.position === "absolute" || computed.position === "fixed";
        let startLeft = parseFloat(computed.left);
        let startTop = parseFloat(computed.top);
        if (positioned && (!Number.isFinite(startLeft) || !Number.isFinite(startTop))) {
          if (computed.position === "fixed") {
            startLeft = rect.left;
            startTop = rect.top;
          } else {
            const parentRect = el.offsetParent ? el.offsetParent.getBoundingClientRect() : { left: 0, top: 0 };
            startLeft = rect.left - parentRect.left;
            startTop = rect.top - parentRect.top;
          }
          el.style.left = `${Math.round(startLeft)}px`;
          el.style.top = `${Math.round(startTop)}px`;
          el.style.right = "auto";
          el.style.bottom = "auto";
        }
        const previousUserSelect = doc.documentElement.style.userSelect;
        const state = {
          handle,
          el,
          doc,
          positioned,
          startX: event.clientX,
          startY: event.clientY,
          width: rect.width,
          height: rect.height,
          left: Number.isFinite(startLeft) ? startLeft : 0,
          top: Number.isFinite(startTop) ? startTop : 0
        };
        let pendingSize = {
          width: state.width,
          height: state.height,
          left: state.left,
          top: state.top
        };
        let resizeFrame = 0;
        let resizeStarted = false;
        let activeResizeGuides = [];

        if (event.target.setPointerCapture) {
          try {
            event.target.setPointerCapture(event.pointerId);
          } catch (_) {}
        }
        doc.documentElement.style.userSelect = "none";

        function paintResize() {
          resizeFrame = 0;
          if (state.positioned && state.handle.includes("w")) {
            state.el.style.left = `${Math.round(pendingSize.left)}px`;
          }
          if (state.positioned && state.handle.includes("n")) {
            state.el.style.top = `${Math.round(pendingSize.top)}px`;
          }
          state.el.style.width = `${Math.round(pendingSize.width)}px`;
          state.el.style.height = `${Math.round(pendingSize.height)}px`;
          state.el.style.boxSizing = "border-box";
          const widthValue = `${Math.round(pendingSize.width)}px`;
          const heightValue = `${Math.round(pendingSize.height)}px`;
          layoutControls.width.value = widthValue;
          layoutControls.width.dataset.readValue = widthValue;
          layoutControls.height.value = heightValue;
          layoutControls.height.dataset.readValue = heightValue;
          selectedLabel.textContent = `${elementLabel(state.el)} · ${Math.round(pendingSize.width)} x ${Math.round(pendingSize.height)}`;
          updateSelectionOverlay();
          renderSmartGuides(doc, activeResizeGuides);
        }

        function move(moveEvent) {
          moveEvent.preventDefault();
          const dx = moveEvent.clientX - state.startX;
          const dy = moveEvent.clientY - state.startY;
          if (!resizeStarted) {
            if (Math.hypot(dx, dy) < 3) {
              return;
            }
            resizeStarted = true;
            pushHistory("调整大小");
          }
          let nextWidth = state.width;
          let nextHeight = state.height;
          let nextLeft = state.left;
          let nextTop = state.top;

          if (state.handle.includes("e")) {
            nextWidth = state.width + dx;
          }
          if (state.handle.includes("w")) {
            nextWidth = state.width - dx;
          }
          nextWidth = Math.max(12, nextWidth);
          if (state.handle.includes("w") && state.positioned) {
            nextLeft = state.left + state.width - nextWidth;
          }
          if (state.handle.includes("s")) {
            nextHeight = state.height + dy;
          }
          if (state.handle.includes("n")) {
            nextHeight = state.height - dy;
          }
          nextHeight = Math.max(12, nextHeight);
          if (state.handle.includes("n") && state.positioned) {
            nextTop = state.top + state.height - nextHeight;
          }
          const proposedRect = normalizeGuideRect({
            left: state.handle.includes("w") && state.positioned ? rect.right - nextWidth : rect.left,
            top: state.handle.includes("n") && state.positioned ? rect.bottom - nextHeight : rect.top,
            width: nextWidth,
            height: nextHeight
          });
          const guided = smartGuidesForResize(state.el, proposedRect, state.handle, state.positioned, moveEvent.altKey);
          nextWidth = guided.rect.width;
          nextHeight = guided.rect.height;
          if (state.handle.includes("w") && state.positioned) {
            nextLeft = state.left + (guided.rect.left - rect.left);
          }
          if (state.handle.includes("n") && state.positioned) {
            nextTop = state.top + (guided.rect.top - rect.top);
          }
          activeResizeGuides = guided.guides;
          pendingSize = {
            width: nextWidth,
            height: nextHeight,
            left: nextLeft,
            top: nextTop
          };
          if (!resizeFrame) {
            resizeFrame = win.requestAnimationFrame(paintResize);
          }
        }

        function up(upEvent) {
          upEvent.preventDefault();
          if (resizeFrame) {
            win.cancelAnimationFrame(resizeFrame);
            paintResize();
          }
          doc.documentElement.style.userSelect = previousUserSelect;
          doc.removeEventListener("pointermove", move, true);
          doc.removeEventListener("pointerup", up, true);
          doc.removeEventListener("pointercancel", up, true);
          hideSmartGuides(doc);
          if (resizeStarted) {
            recordVisualPatch(state.el);
            syncSourceFromPreview();
            readLayoutControls();
          }
        }

        doc.addEventListener("pointermove", move, true);
        doc.addEventListener("pointerup", up, true);
        doc.addEventListener("pointercancel", up, true);
      }

      function previewSandbox() {
        return previewMode === "interact" ? INTERACTIVE_SANDBOX : EDIT_SANDBOX;
      }

      function freezeBootstrappedEditPreview(renderId) {
        if (previewMode !== "edit" || previewFrame.dataset.editBootstrapId !== renderId) {
          return;
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement) {
          previewFrame.style.pointerEvents = "";
          return;
        }

        const renderedHtml = `<!doctype html>\n${doc.documentElement.outerHTML}`;
        previewFrame.removeAttribute("data-edit-bootstrap-id");
        previewFrame.srcdoc = preparePreviewDocument(renderedHtml, {
          executeScripts: false
        });
      }

      function persistPreviewToSource() {
        if (activeTextOverlay) {
          commitTextOverlay();
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement) {
          return false;
        }

        sourceInput.value = cleanExportDocument(doc);
        setEditorReady(true);
        updateStats(0, doc.images ? doc.images.length : 0);
        return true;
      }

      function setPreviewMode(nextMode, options = {}) {
        const mode = PREVIEW_MODES.includes(nextMode) ? nextMode : "edit";
        if (mode === previewMode && !options.force) {
          return;
        }

        if (options.persist !== false) {
          persistPreviewToSource();
        }

        previewMode = mode;
        document.body.dataset.previewMode = previewMode;
        modeButtons.forEach((button) => {
          const isActive = button.dataset.previewMode === previewMode;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-selected", String(isActive));
        });
        modeHint.textContent = previewMode === "interact"
          ? "交互模式：执行原页面脚本"
          : "编辑模式：脚本保留但不执行";

        if (previewMode === "interact") {
          clearSelection();
        }

        renderPreview();
      }

      function renderPreview() {
        const source = sourceInput.value;
        window.clearTimeout(editBootstrapTimer);
        if (!source.trim()) {
          clearSelection();
          app.classList.remove("pm-template-edit-visible");
          previewFrame.style.height = "";
          previewFrame.style.pointerEvents = "";
          previewFrame.removeAttribute("data-edit-bootstrap-id");
          previewFrame.removeAttribute("srcdoc");
          setEditorReady(false);
          setImportVisible(true);
          return;
        }
        const renderId = String(++previewRenderId);
        const bootstrappingEdit = previewMode === "edit";
        const safeHtml = preparePreviewDocument(source, {
          executeScripts: previewMode === "interact" || bootstrappingEdit
        });
        setEditorReady(true);
        clearSelection();
        app.classList.remove("pm-template-edit-visible");
        previewFrame.style.height = "";
        if (bootstrappingEdit) {
          previewFrame.dataset.editBootstrapId = renderId;
          previewFrame.style.pointerEvents = "none";
        } else {
          previewFrame.removeAttribute("data-edit-bootstrap-id");
          previewFrame.style.pointerEvents = "";
        }
        previewFrame.setAttribute("sandbox", previewSandbox());
        previewFrame.srcdoc = safeHtml;
        renderStatus.textContent = "正在渲染...";
        updateStats(0, 0);
      }

      function resizePreviewFrameToDocument(doc) {
        if (!doc || !doc.documentElement || !doc.body) {
          return;
        }
        if (previewMode === "edit" && isPmIssueTemplateDocument(doc)) {
          previewFrame.style.height = "";
          return;
        }
        const managedPages = getManagedPages(doc);
        if (managedPages.length) {
          const bodyRect = doc.body.getBoundingClientRect();
          const pageRects = managedPages.map((page) => page.getBoundingClientRect());
          const bottom = Math.max(...pageRects.map((rect) => rect.bottom), bodyRect.bottom);
          const top = Math.min(...pageRects.map((rect) => rect.top), bodyRect.top);
          const height = Math.ceil(bottom - top + 48);
          previewFrame.style.height = `${Math.max(height, previewFrame.clientHeight)}px`;
          return;
        }
        const height = Math.max(
          doc.documentElement.scrollHeight,
          doc.body.scrollHeight,
          previewFrame.clientHeight
        );
        previewFrame.style.height = `${height}px`;
      }

      function schedulePreviewFrameResize(doc) {
        if (!doc || !doc.defaultView) {
          return;
        }
        doc.defaultView.requestAnimationFrame(() => resizePreviewFrameToDocument(doc));
        [80, 240, 520].forEach((delay) => {
          window.setTimeout(() => resizePreviewFrameToDocument(doc), delay);
        });
      }

      function scrollPreviewDocumentByWheel(event, doc, win) {
        if (!doc || !win || !doc.body) {
          return false;
        }
        const maxScroll = Math.max(0, doc.documentElement.scrollHeight - win.innerHeight);
        if (maxScroll <= 0) {
          return false;
        }
        const current = win.scrollY || doc.documentElement.scrollTop || doc.body.scrollTop || 0;
        const next = Math.max(0, Math.min(maxScroll, current + event.deltaY));
        if (next === current) {
          return false;
        }
        event.preventDefault();
        win.scrollTo({ top: next, behavior: "auto" });
        updateSelectionOverlay();
        return true;
      }

      function forwardWheelToPreviewFrame(event) {
        if (!app.classList.contains("pm-template-edit-visible")) {

        }
        if (!previewCanvasActive && !(target && target.closest(".preview-shell"))) {
          return;
        }
        scrollPreviewDocumentByWheel(event, previewFrame.contentDocument, previewFrame.contentWindow);
      }

      function isPmIssueTemplateDocument(doc) {
        return Boolean(doc && doc.querySelector(PM_TEMPLATE_PAGE_SELECTOR));
      }

      function compactTopLevelPages(elements) {
        const unique = [...new Set(elements)].filter((el) => el && el.ownerDocument && el.ownerDocument.body && el.ownerDocument.body.contains(el));
        return unique.filter((el) => !unique.some((other) => other !== el && other.contains(el)));
      }

      function isIgnoredGenericBodyChild(node) {
        if (!node || node.nodeType !== Node.ELEMENT_NODE) {
          return false;
        }
        return ["SCRIPT", "STYLE", "NOSCRIPT", "TEMPLATE"].includes(node.tagName);
      }

      function markGenericManagedPage(page) {
        if (!page || page.nodeType !== Node.ELEMENT_NODE) {
          return;
        }
        page.setAttribute("data-html-report-managed-page", "true");
        updateManagedPagePositionMetadata(page);
      }

      function updateManagedPagePositionMetadata(page) {
        if (!page || page.nodeType !== Node.ELEMENT_NODE) {
          return;
        }
        const win = page.ownerDocument && page.ownerDocument.defaultView;
        const position = win ? win.getComputedStyle(page).position : "";
        if (position === "absolute" || position === "fixed") {
          page.setAttribute("data-html-report-live-editor-preserve-position", "true");
        } else {
          page.removeAttribute("data-html-report-live-editor-preserve-position");
        }
      }

      function refreshManagedPagePositionMetadata(doc) {
        if (!doc || !doc.body) {
          return;
        }
        doc.querySelectorAll(MANAGED_PAGE_SELECTOR).forEach(updateManagedPagePositionMetadata);
      }

      function findGenericManagedPageCandidates(doc) {
        if (!doc || !doc.body) {
          return [];
        }
        const bodyRoots = [...doc.body.children].filter((node) => !isIgnoredGenericBodyChild(node));
        const explicit = compactTopLevelPages([...doc.querySelectorAll(GENERIC_PAGE_CANDIDATE_SELECTOR)]);
        if (bodyRoots.length === 1) {
          const root = bodyRoots[0];
          if (explicit.length && explicit.every((page) => page === root || root.contains(page)) && !explicit.includes(root)) {
            return [root];
          }
          return explicit.length ? explicit : bodyRoots;
        }
        if (explicit.length) {
          return explicit;
        }
        const pageLikeRoots = bodyRoots.filter((node) => {
          const tag = node.tagName.toLowerCase();
          const className = String(node.className || "");
          return ["main", "section", "article"].includes(tag) || /\b(page|slide|screen)\b/i.test(className);
        });
        return pageLikeRoots.length === bodyRoots.length ? pageLikeRoots : [];
      }

      function ensureGenericManagedPages(doc) {
        if (!doc || !doc.body || isPmIssueTemplateDocument(doc) || doc.querySelector(MANAGED_PAGE_SELECTOR)) {
          return false;
        }
        const candidates = findGenericManagedPageCandidates(doc);
        if (candidates.length) {
          candidates.forEach(markGenericManagedPage);
          return true;
        }

        const page = doc.createElement("main");
        page.className = "html-report-managed-page";
        markGenericManagedPage(page);
        const nodesToWrap = [...doc.body.childNodes].filter((node) => !isIgnoredGenericBodyChild(node));
        nodesToWrap.forEach((node) => page.appendChild(node));
        doc.body.appendChild(page);
        return true;
      }

      function prepareManagedPagesForEdit(doc) {
        if (previewMode !== "edit") {
          return false;
        }
        const changed = ensureGenericManagedPages(doc);
        refreshManagedPagePositionMetadata(doc);
        return changed;
      }

      function getManagedPages(doc) {
        if (!doc || !doc.body) {
          return [];
        }
        if (isPmIssueTemplateDocument(doc)) {
          return [...doc.querySelectorAll(".slide")];
        }
        return [...doc.querySelectorAll(MANAGED_PAGE_SELECTOR)];
      }

      function syncManagedPageChrome(doc) {
        const hasManagedPages = Boolean(getManagedPages(doc).length);
        app.classList.toggle("pm-template-edit-visible", previewMode === "edit" && hasManagedPages);
        return hasManagedPages;
      }

      function directNestedSlides(page) {
        if (!page) {
          return [];
        }
        return [...page.querySelectorAll(".slide")].filter((slide) => {
          const parentPage = slide.parentElement && slide.parentElement.closest(MANAGED_PAGE_SELECTOR);
          return parentPage === page;
        });
      }

      function managedPagesInClone(root) {
        if (!root) {
          return [];
        }
        if (root.querySelector(PM_TEMPLATE_PAGE_SELECTOR)) {
          return [...root.querySelectorAll(".slide")];
        }
        return [...root.querySelectorAll(MANAGED_PAGE_SELECTOR)];
      }

      function revealStaticPage(page) {
        if (!page) {
          return;
        }
        page.classList.add("is-active");
        page.style.opacity = "";
        page.style.pointerEvents = "";
        page.querySelectorAll("[data-build], [data-effect]").forEach((node) => {
          node.classList.add("is-visible");
          node.classList.remove("is-dimmed", "is-current");
        });
      }

      function pruneNestedSlidesToActive(page) {
        const slides = directNestedSlides(page);
        const activeSlide = slides.find((slide) => slide.classList.contains("is-active"));
        if (slides.length <= 1 || !activeSlide) {
          return;
        }
        const activeSlideId = activeSlide.getAttribute("data-slide-id");
        slides.forEach((slide) => {
          const sameSlide = activeSlideId
            ? slide.getAttribute("data-slide-id") === activeSlideId
            : slide.classList.contains("is-active");
          if (!sameSlide) {
            slide.remove();
            return;
          }
          revealStaticPage(slide);
        });
      }

      function removeTemplateRuntimeChrome(root) {
        root.querySelectorAll([
          ".counter",
          "#counter",
          ".progress",
          "#progressBar",
          ".speaker-notes",
          "#speakerNotes",
          ".controls",
          ".pager"
        ].join(",")).forEach((node) => node.remove());

      function currentManagedPageTemplateHtml(doc) {
        if (!doc) {
          return "";
        }
        const pages = getManagedPages(doc);
        const currentPage = getCurrentManagedPage(doc);
        const currentIndex = pages.indexOf(currentPage);
        if (!currentPage || currentIndex < 0) {
          return "";
        }
        return cleanExportDocument(doc, {
          stripScripts: true,
          prepareClone(clone) {
            const clonePages = managedPagesInClone(clone);
            const clonePage = clonePages[currentIndex] || clonePages[0];
            clonePages.forEach((page) => {
              if (page !== clonePage) {
                page.remove();
              }
            });
            revealStaticPage(clonePage);
            pruneNestedSlidesToActive(clonePage);
            removeTemplateRuntimeChrome(clone);
          }
        });
      }

      function staticCurrentPageTemplateHtml(doc) {
        if (!doc || isPmIssueTemplateDocument(doc)) {
          return "";
        }
        const pages = getManagedPages(doc);
        const currentPage = getCurrentManagedPage(doc);
        if (!currentPage || pages.length !== 1) {
          return "";
        }
        const slides = directNestedSlides(currentPage);
        const activeSlide = slides.find((slide) => slide.classList.contains("is-active"));
        if (slides.length <= 1 || !activeSlide) {
          return "";
        }
        const activeSlideId = activeSlide.getAttribute("data-slide-id");
        return cleanExportDocument(doc, {
          stripScripts: true,
          prepareClone(clone) {
            const clonePage = clone.querySelector(MANAGED_PAGE_SELECTOR);
            if (!clonePage) {
              return;
            }
            const cloneSlides = directNestedSlides(clonePage);
            cloneSlides.forEach((slide) => {
              const sameSlide = activeSlideId
                ? slide.getAttribute("data-slide-id") === activeSlideId
                : slide.classList.contains("is-active");
              if (!sameSlide) {
                slide.remove();
                return;
              }
              slide.classList.add("is-active");
              slide.querySelectorAll("[data-build], [data-effect]").forEach((node) => {
                node.classList.add("is-visible");
                node.classList.remove("is-dimmed", "is-current");
              });
            });
            clonePage.querySelectorAll(".counter, #counter, .progress, #progressBar, .speaker-notes, #speakerNotes").forEach((node) => node.remove());
          }
        });
      }

      function getPageTitleElement(page) {
        return page ? page.querySelector("h1, h2, .title, .deck-title, .kicker, .eyebrow") : null;
      }

      function getPageLabel(page, index) {
        const title = getPageTitleElement(page);
        const text = title ? title.textContent.trim().replace(/\s+/g, " ") : "";
        return text || `第 ${String(index + 1).padStart(2, "0")} 页`;

      function clearPageDropMarkers() {
        if (!pageManagerList) {
          return;
        }
        pageManagerList.querySelectorAll(".page-manager__item").forEach((item) => {
          item.classList.remove("is-dragging", "is-drop-before", "is-drop-after");
          item.removeAttribute("data-drop-position");

      function stopPageDragAutoScroll() {
        pageDragScrollSpeed = 0;
        if (pageDragAutoScrollFrame) {
          window.cancelAnimationFrame(pageDragAutoScrollFrame);
          pageDragAutoScrollFrame = 0;
        }
      }

      function runPageDragAutoScroll() {
        if (!pageManagerList || !pageDragScrollSpeed) {
          pageDragAutoScrollFrame = 0;
          return;
        }
        pageManagerList.scrollTop += pageDragScrollSpeed;
        pageDragAutoScrollFrame = window.requestAnimationFrame(runPageDragAutoScroll);
      }

      function updatePageDragAutoScroll(clientY) {
        if (!pageManagerList) {
          return;
        }
        const rect = pageManagerList.getBoundingClientRect();
        const threshold = Math.min(56, Math.max(34, rect.height * .24));
        let speed = 0;
        if (clientY < rect.top + threshold) {
          speed = -Math.ceil(((rect.top + threshold - clientY) / threshold) * 18);
        } else if (clientY > rect.bottom - threshold) {
          speed = Math.ceil(((clientY - (rect.bottom - threshold)) / threshold) * 18);
        }
        pageDragScrollSpeed = speed;
        if (!speed) {
          stopPageDragAutoScroll();
          return;
        }
        if (!pageDragAutoScrollFrame) {
          pageDragAutoScrollFrame = window.requestAnimationFrame(runPageDragAutoScroll);
        }
      }

      function startRenameManagedPage(index, labelElement) {
        const doc = previewFrame.contentDocument;
        const page = getManagedPages(doc)[index];
        const title = getPageTitleElement(page);
        if (!doc || !page || !title || !labelElement) {
          return;
        }
        const previous = getPageLabel(page, index);
        const input = document.createElement("input");
        input.className = "page-manager__rename";
        input.value = previous;
        input.setAttribute("aria-label", "页面名称");
        labelElement.replaceWith(input);
        input.focus();
        input.select();

        let finished = false;
        const finish = (shouldSave) => {
          if (finished) {
            return;
          }
          finished = true;
          const next = input.value.trim();
          if (shouldSave && next && next !== previous) {
            pushHistory("重命名页面");
            title.textContent = next;
            syncSourceFromPreview();
            showToast("已重命名页面。");
          }
          renderPageManager(doc);
          setActiveManagedPage(index);
        };

        input.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            finish(true);
          }
          if (event.key === "Escape") {
            event.preventDefault();
            finish(false);
          }
        });
        input.addEventListener("blur", () => finish(true));
      }

      function moveManagedPage(fromIndex, toIndex, position) {
        const doc = previewFrame.contentDocument;
        const pages = getManagedPages(doc);
        const moving = pages[fromIndex];
        const target = pages[toIndex];
        if (!doc || !moving || !target || moving === target) {
          clearPageDropMarkers();
          return;
        }
        pushHistory("页面排序");
        target.insertAdjacentElement(position === "before" ? "beforebegin" : "afterend", moving);
        const nextIndex = getManagedPages(doc).indexOf(moving);
        refreshPageManagerAfterChange(doc, Math.max(0, nextIndex), "已调整页面顺序。");
      }

      function pageThumbnailType(page, index) {
        const text = getPageLabel(page, index);
        if (/方案|对比|选择|推荐/.test(text)) {
          return "compare";
        }
        if (/决策|行动|会后|记录|确认/.test(text)) {
          return "decision";
        }
        return "issue";
      }

      function createManagedPageThumbnail(page, index) {
        try {
          if (!page || !page.ownerDocument) {
            return "";
          }
          const sourceDoc = page.ownerDocument;
          const thumbDoc = document.implementation.createHTMLDocument(`page-${index + 1}`);
          const htmlStyle = sourceDoc.documentElement.getAttribute("style");
          const bodyStyle = sourceDoc.body && sourceDoc.body.getAttribute("style");
          if (htmlStyle) {
            thumbDoc.documentElement.setAttribute("style", htmlStyle);
          }
          if (bodyStyle) {
            thumbDoc.body.setAttribute("style", bodyStyle);
          }
          sourceDoc.head.querySelectorAll("style").forEach((style) => {
            thumbDoc.head.appendChild(style.cloneNode(true));
          });
          const clone = page.cloneNode(true);
          stripEditorArtifacts(clone);
          markGenericManagedPage(clone);
          thumbDoc.body.appendChild(clone);
          return createCustomTemplateThumbnail(`<!doctype html>\n${thumbDoc.documentElement.outerHTML}`, pageThumbnailType(page, index));
        } catch {
          return "";
        }
      }

      function pageThumbnailMarkup(page, index) {
        const type = pageThumbnailType(page, index);
        const thumbnail = createManagedPageThumbnail(page, index);
        if (thumbnail) {
          return `<span class="page-manager__thumb page-manager__thumb--image" aria-hidden="true"><img src="${escapeTemplateHtml(thumbnail)}" alt=""></span>`;
        }

        return `

            <span class="page-thumb__line one"></span>
            <span class="page-thumb__line two"></span>
            <span class="page-thumb__card one"></span>
            <span class="page-thumb__card two"></span>
            ${extraCard}
          </span>
        `;

      function syncManagedPageActiveState(doc, index) {
        const pages = getManagedPages(doc);
        if (!pages.length) {
          return;

        const safeIndex = Math.max(0, Math.min(index, pages.length - 1));
        if (isPmIssueTemplateDocument(doc)) {
          pages.forEach((page, pageIndex) => {
            page.classList.toggle("is-active", pageIndex === safeIndex);
          });
          const pageNow = doc.getElementById("pageNow");
          const pageTotal = doc.getElementById("pageTotal");
          const prevBtn = doc.getElementById("prevBtn");
          const nextBtn = doc.getElementById("nextBtn");
          if (pageNow) {
            pageNow.textContent = String(safeIndex + 1).padStart(2, "0");
          }
          if (pageTotal) {
            pageTotal.textContent = String(pages.length).padStart(2, "0");
          }
          if (prevBtn) {
            prevBtn.disabled = safeIndex === 0;
          }
          if (nextBtn) {
            nextBtn.disabled = safeIndex === pages.length - 1;
          }
        }
      }

      function setActiveManagedPage(index) {
        const pages = getManagedPages(previewFrame.contentDocument);
        activeManagedPageIndex = pages.length
          ? Math.max(0, Math.min(index, pages.length - 1))

      function scrollPreviewToManagedPage(index) {

        const pages = getManagedPages(doc);
        const page = pages[activeManagedPageIndex];
        if (!page) {

        }
        previewCanvasActive = true;
        const current = win.scrollY || doc.documentElement.scrollTop || doc.body.scrollTop || 0;
        const top = Math.max(0, current + page.getBoundingClientRect().top - 28);
        win.scrollTo({ top, behavior: "auto" });

      function createBlankPmTemplatePage(doc, index) {

      function normalizeManagedPageIdentity(page, index) {
        if (!page || page.nodeType !== Node.ELEMENT_NODE) {
          return;
        }
        const pageNumber = String(index + 1).padStart(2, "0");
        if (page.matches(".slide")) {
          page.dataset.page = String(index + 1);
          if (page.matches(PM_TEMPLATE_PAGE_SELECTOR)) {
            page.classList.toggle("is-active", index === 0);

        if (progress) {
