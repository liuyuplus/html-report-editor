  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML 汇报材料编辑器</title>
  <style>
    :root {

      --slate-1: #fcfcfd;

      --blue-1: #fbfdff;

      --red-1: #fffcfc;
      --red-2: #fff7f7;
      --red-3: #feebec;
      --red-4: #ffdbdc;
      --red-5: #ffcdce;
      --red-6: #fdbdbe;
      --red-7: #f4a9aa;
      --red-8: #eb8e90;
      --red-9: #e5484d;
      --red-10: #dc3e42;
      --red-11: #ce2c31;
      --red-12: #641723;

      --bg: var(--slate-1);
      --surface: var(--slate-2);
      --surface-strong: var(--slate-3);
      --line: var(--slate-6);
      --line-strong: var(--slate-7);
      --text: var(--slate-12);
      --muted: var(--slate-11);
      --soft: var(--slate-10);
      --accent-bg: var(--green-9);
      --accent-bg-hover: var(--green-10);
      --accent-soft: var(--green-3);
      --accent-line: var(--green-6);
      --accent-text: var(--green-11);
      --info-soft: var(--blue-3);
      --info-line: var(--blue-6);
      --info-text: var(--blue-11);
      --danger-soft: var(--red-3);
      --danger-line: var(--red-6);
      --danger-text: var(--red-11);
      --shadow: 0 18px 48px rgba(28, 32, 36, 0.11);
      --radius-sm: 6px;
      --radius-md: 8px;
      --topbar: 64px;
      --inspector-width: 360px;
      --inspector-rail-width: 54px;
      --format-painter-cursor: copy;
      --workspace-gutter: 28px;

      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --slate-1: #111113;

        --blue-1: #0d1520;

        --blue-6: #104d87;

        --blue-8: #2870bd;
        --blue-9: #0090ff;
        --blue-10: #3b9eff;
        --blue-11: #70b8ff;
        --blue-12: #c2e6ff;

        --red-1: #191111;
        --red-2: #201314;
        --red-3: #3b1219;
        --red-4: #500f1c;
        --red-5: #611623;
        --red-6: #72232d;
        --red-7: #8c333a;
        --red-8: #b54548;
        --red-9: #e5484d;
        --red-10: #ec5d5e;
        --red-11: #ff9592;
        --red-12: #ffd1d9;

        --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      }
    }

    :root[data-theme="dark"] {
      --slate-1: #111113;
      --slate-2: #18191b;

      --red-11: #ff9592;
      --red-12: #ffd1d9;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
    }

    :root {
      color-scheme: light;

      --bg: #f4f4f4;
      --surface: #ffffff;
      --surface-strong: #f8f8f8;
      --line: #e5e7eb;
      --line-strong: #d7d7d7;
      --text: #101010;
      --muted: #6b7280;
      --soft: #898989;

      --accent-bg: #101010;
      --accent-bg-hover: #2a2a2a;
      --accent-soft: #f1f5f9;
      --accent-line: #d8dee8;
      --accent-text: #242424;
      --info-soft: #eff6fe;
      --info-line: #d9e8f7;
      --info-text: #2563eb;
      --danger-soft: #fff1f1;
      --danger-line: #ffd6d6;
      --danger-text: #d92d20;

      --green-3: var(--info-soft);
      --green-4: #e7f1fb;
      --green-6: var(--info-line);
      --green-9: #0099ff;
      --green-10: #007fd4;
      --green-11: #2563eb;
      --green-12: #101010;
      --blue-8: #47b6ff;
      --blue-9: #0099ff;
      --blue-11: #2563eb;

      --shadow: 0 4px 8px rgba(36, 36, 36, 0.05);
      --shadow-pop: 0 1px 5px rgba(36, 36, 36, 0.08), 0 10px 28px rgba(36, 36, 36, 0.08);
      --radius-sm: 9px;
      --radius-md: 12px;
      --topbar: 64px;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;

        --bg: #101010;
        --surface: #181818;
        --surface-strong: #202020;
        --line: #2a2a2a;
        --line-strong: #363636;
        --text: #ffffff;
        --muted: #a3a3a3;
        --soft: #7a7a7a;

        --accent-bg: #ffffff;
        --accent-bg-hover: #f4f4f4;
        --accent-soft: #202020;
        --accent-line: #363636;
        --accent-text: #ffffff;
        --info-soft: #162637;
        --info-line: #27415a;
        --info-text: #47b6ff;
        --danger-soft: #341b1b;
        --danger-line: #5a2a2a;
        --danger-text: #ff8f86;

        --green-3: var(--info-soft);
        --green-4: #1a3144;
        --green-6: var(--info-line);
        --green-9: #47b6ff;
        --green-10: #70c6ff;
        --green-11: #47b6ff;
        --green-12: #ffffff;
        --blue-8: #47b6ff;
        --blue-9: #47b6ff;
        --blue-11: #8ed3ff;

        --shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
        --shadow-pop: 0 16px 34px rgba(0, 0, 0, 0.32);
      }
    }

    :root[data-theme="dark"] {
      color-scheme: dark;

      --bg: #101010;
      --surface: #181818;
      --surface-strong: #202020;
      --line: #2a2a2a;
      --line-strong: #363636;
      --text: #ffffff;
      --muted: #a3a3a3;
      --soft: #7a7a7a;

      --accent-bg: #ffffff;
      --accent-bg-hover: #f4f4f4;
      --accent-soft: #202020;
      --accent-line: #363636;
      --accent-text: #ffffff;
      --info-soft: #162637;
      --info-line: #27415a;
      --info-text: #47b6ff;
      --danger-soft: #341b1b;
      --danger-line: #5a2a2a;
      --danger-text: #ff8f86;

      --green-3: var(--info-soft);
      --green-4: #1a3144;
      --green-6: var(--info-line);
      --green-9: #47b6ff;
      --green-10: #70c6ff;
      --green-11: #47b6ff;
      --green-12: #ffffff;
      --blue-8: #47b6ff;
      --blue-9: #47b6ff;
      --blue-11: #8ed3ff;

      --shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
      --shadow-pop: 0 16px 34px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 320px;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--bg);
    }

    button,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: var(--topbar) minmax(0, 1fr);
      height: 100dvh;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 0 18px 0 22px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      backdrop-filter: blur(18px);
      z-index: 10;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 1px 3px rgba(16, 16, 16, .14);
      flex: 0 0 auto;
    }

    .mark img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon.spark svg {
      fill: currentColor;
      stroke: none;
    }

    .title-group {
      min-width: 0;
      line-height: 1.08;
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 680;
      letter-spacing: 0;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: end;
      gap: 8px;
      min-width: 0;
    }

    .button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
      user-select: none;
    }

    .button:hover {
      background: var(--surface-strong);
      border-color: var(--line-strong);
    }

    .button:disabled,
    .segment:disabled {
      opacity: .48;
      cursor: not-allowed;
      transform: none;
    }

    .button:active {
      transform: translateY(1px);
    }

    .button:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--blue-8);
      outline-offset: 2px;
    }

    .button.primary {
      border-color: var(--accent-bg);
      background: var(--accent-bg);
      color: #fbfefc;
      font-weight: 650;
    }

    .button.primary:hover {
      border-color: var(--accent-bg-hover);
      background: var(--accent-bg-hover);
    }

    .button.is-active {
      border-color: var(--accent-line);
      background: var(--accent-soft);
      color: var(--accent-text);
      font-weight: 650;
    }

    .icon-only {
      width: 36px;
      padding: 0;
    }

    .segmented {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 3px;
    }

    .segment {
      min-height: 28px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .segment:hover {
      color: var(--text);
      background: var(--surface-strong);
    }

    .segment.is-active {
      background: var(--accent-soft);
      color: var(--accent-text);
      font-weight: 650;
    }

    .workspace {
      display: block;
      min-height: 0;
      position: relative;
    }

    .source-pane {
      position: fixed;
      right: 16px;
      top: calc(var(--topbar) + 12px);
      bottom: 16px;
      width: min(620px, calc(100vw - 32px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface);
      overflow: hidden;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateX(12px);
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 16;
    }

    .app.source-visible .source-pane {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .source-backdrop {
      position: fixed;
      inset: var(--topbar) 0 0;
      background: rgba(28, 32, 36, .16);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 15;
    }

    .app.source-visible .source-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    .pane-head {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .pane-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 13px;
      font-weight: 650;
      color: var(--text);
      white-space: nowrap;
    }

    .source-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green-9);
      box-shadow: 0 0 0 4px var(--green-3);
      flex: 0 0 auto;
    }

    .chip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
    }

    .chip {
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--info-line);
      border-radius: 999px;
      background: var(--info-soft);
      color: var(--info-text);
      padding: 0 9px;
      font-size: 12px;
      font-weight: 560;
      white-space: nowrap;
    }

    .editor-wrap {
      min-height: 0;
      position: relative;
    }

    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      padding: 18px;
      background: var(--surface);
      color: var(--text);
      caret-color: var(--green-9);
      line-height: 1.62;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      tab-size: 2;
    }

    textarea::placeholder {
      color: var(--slate-9);
    }

    .source-foot {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
    }

    .preview-pane {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      background: var(--bg);
    }

    .preview-pane > .pane-head {
      display: none;
    }

    .preview-shell {
      min-width: 0;
      min-height: 0;
      padding: 14px;
      padding-left: calc(14px + var(--inspector-width) + var(--workspace-gutter));
      overflow: hidden;
      position: relative;
      transition: padding-left 180ms ease;
    }

    .app.layout-collapsed .preview-shell {
      padding-left: calc(14px + var(--inspector-rail-width) + var(--workspace-gutter));
    }

    body:not(.has-content) .preview-shell,
    body[data-preview-mode="interact"] .preview-shell {
      padding-left: 14px;
    }

    .frame-wrap {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--slate-1);
      box-shadow: var(--shadow);
    }

    .import-screen {
      position: absolute;
      inset: 14px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, transparent 0, transparent calc(100% - 1px), color-mix(in srgb, var(--line) 48%, transparent) calc(100% - 1px)) 0 0 / 44px 44px,
        color-mix(in srgb, var(--bg) 94%, transparent);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      z-index: 4;
    }

    .import-screen[hidden] {
      display: none;
    }

    .import-card {
      width: min(720px, calc(100vw - 56px));
      max-height: min(760px, calc(100dvh - 120px));
      display: grid;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--surface) 96%, transparent);
      box-shadow: var(--shadow);
      padding: 18px;
      overflow: auto;
    }

    .import-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
    }

    .import-title {
      margin: 0;
      color: var(--text);
      font-size: 18px;
      line-height: 1.22;
      font-weight: 720;
      letter-spacing: 0;
    }

    .import-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .drop-zone {
      min-height: 84px;
      display: grid;
      place-items: center;
      gap: 8px;
      border: 1px dashed var(--accent-line);
      border-radius: var(--radius-md);
      background: var(--accent-soft);
      color: var(--accent-text);
      padding: 14px;
      text-align: center;
    }

    .drop-zone.is-dragging {
      border-color: var(--green-9);
      background: var(--green-4);
    }

    .drop-title {
      font-size: 14px;
      font-weight: 680;
      color: var(--green-12);
    }

    .drop-hint {
      color: var(--accent-text);
      font-size: 12px;
      line-height: 1.45;
    }

    .import-upload-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .resource-choice {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--surface-strong);
    }

    .resource-choice[hidden] {

    .layout-actions {

    .layout-actions-row {

      align-items: center;

      min-width: 0;

    .format-painter-menu button {

    .format-painter-menu button:hover {

    .selection-chip {

    body[data-preview-mode="interact"] .layout-panel {

      background: var(--danger-soft);

    .toast.is-error {

      background: var(--danger-soft);

      width: 1px;
      height: 1px;

      clip: rect(0, 0, 0, 0);

      backdrop-filter: blur(18px) saturate(1.15);

      background: var(--text);
      color: var(--surface);
      box-shadow: var(--shadow);
    }

    .mark svg,

    }

    .title {
      font-weight: 650;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--soft);
    }

    .button {
      border: 0;
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 560;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease, transform 160ms ease;

      color: var(--surface);
      box-shadow: var(--shadow-pop);
      font-weight: 650;

    .button.primary:hover {
      border: 0;
      background: var(--accent-bg-hover);
    }

    .button.is-active {
      border: 0;
      background: var(--text);
      color: var(--surface);
      box-shadow: var(--shadow-pop);
    }

    .icon-only {

    }

      color: var(--text);

    .import-card,
    .frame-wrap,

      box-shadow: 0 18px 48px rgba(16, 16, 16, .22);
      font-size: 14px;
      font-weight: 760;
      letter-spacing: -.01em;
      z-index: 80;

    .pane-head,

    textarea,
    .import-textarea,
    .field {

    }

    .preview-shell {

      background: var(--bg);

    .layout-panel {

      top: calc(var(--topbar) + 14px);

      border: 0;
      border-radius: var(--radius-md);
      background: var(--surface);
      box-shadow: var(--shadow-pop);
    }

    .app.layout-collapsed .layout-panel {

    .layout-head {

    .panel-note {

      background: var(--surface-strong);

    .layout-actions .tool-button,

    .layout-actions .tool-button.is-active {

    .app.pm-template-edit-visible .preview-shell {

    }

    .app.pm-template-edit-visible iframe {

    @media (max-width: 900px) {

          textNodes.push(walker.currentNode);
        }
        textNodes.forEach((node) => {
          let value = node.nodeValue;
          replacements.forEach((next, previous) => {
            value = value.replaceAll(previous, next);
          });
          node.nodeValue = value;
        });

        applyTemplateWideLayout(doc);
        return `<!doctype html>\n${doc.documentElement.outerHTML}`;
      }

      function loadReviewNextTemplate() {
        const html = reviewNextTemplateHtml();
        if (!html) {
          showToast("模板资源未加载，请重新打开编辑器。", true);
          return;
        }
        closeTemplateLibrary();
        loadHtmlContent(html, { message: "已载入复盘与下一步模板。" });
      }

      function escapeTemplateHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function customTemplateCategoryLabel(category) {
        return {
          problem: "问题",
          decision: "决策",
          review: "复盘",
          custom: "自定义"
        }[category] || "自定义";
      }

      function customTemplatePreviewClass(category) {
        if (category === "review") {
          return "template-card__preview--review";
        }
        if (category === "problem") {
          return "template-card__preview--single";
        }
        return "template-card__preview--pm";
      }

      function sanitizeTemplateColor(value, fallback) {
        const color = String(value || "").trim();
        if (/^#[0-9a-f]{3,8}$/i.test(color) || /^rgba?\([^)]+\)$/i.test(color)) {
          return color;
        }
        return fallback;
      }

      function templateColorToRgb(value) {
        const color = String(value || "").trim();
        const hex = color.match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);
        if (hex) {
          const raw = hex[1].length === 3
            ? hex[1].split("").map((item) => item + item).join("")
            : hex[1];
          return {
            r: parseInt(raw.slice(0, 2), 16),
            g: parseInt(raw.slice(2, 4), 16),
            b: parseInt(raw.slice(4, 6), 16)
          };
        }
        const rgb = color.match(/^rgba?\(([^)]+)\)$/i);
        if (rgb) {
          const parts = rgb[1].split(",").map((part) => Number.parseFloat(part.trim())).slice(0, 3);
          if (parts.length === 3 && parts.every(Number.isFinite)) {
            return { r: parts[0], g: parts[1], b: parts[2] };
          }
        }
        return null;
      }

      function templateRelativeLuminance(color) {
        const rgb = templateColorToRgb(color);
        if (!rgb) {
          return null;
        }
        const channels = [rgb.r, rgb.g, rgb.b].map((value) => {
          const normalized = Math.max(0, Math.min(255, value)) / 255;
          return normalized <= 0.03928
            ? normalized / 12.92
            : Math.pow((normalized + 0.055) / 1.055, 2.4);
        });
        return channels[0] * 0.2126 + channels[1] * 0.7152 + channels[2] * 0.0722;
      }

      function templateContrastRatio(first, second) {
        const a = templateRelativeLuminance(first);
        const b = templateRelativeLuminance(second);
        if (a === null || b === null) {
          return 21;
        }
        const lighter = Math.max(a, b);
        const darker = Math.min(a, b);
        return (lighter + 0.05) / (darker + 0.05);
      }

      function readableTemplateTextColor(color, background) {
        if (templateContrastRatio(color, background) >= 3.8) {
          return color;
        }
        const bgLuminance = templateRelativeLuminance(background);
        return bgLuminance !== null && bgLuminance > 0.52 ? "#101010" : "#f6f8fb";
      }

      function extractTemplateColor(source, names, fallback) {
        for (const name of names) {
          const variableMatch = source.match(new RegExp(`--${name}\\s*:\\s*(#[0-9a-fA-F]{3,8}|rgba?\\([^)]+\\))`));
          if (variableMatch) {
            return sanitizeTemplateColor(variableMatch[1], fallback);
          }
        }
        const wantsBackground = names.some((name) => ["bg", "surface", "surface2", "background"].includes(name));
        const wantsText = names.some((name) => ["text", "foreground"].includes(name));
        const propertyMatch = wantsBackground
          ? source.match(/background(?:-color)?\s*:[^;]*(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\))/)
          : wantsText
            ? source.match(/(?:^|[;\s])color\s*:[^;]*(#[0-9a-fA-F]{3,8}|rgba?\([^)]+\))/)
            : null;
        return sanitizeTemplateColor(propertyMatch && propertyMatch[1], fallback);
      }

      function templateThumbnailText(page, doc) {
        const title = (page && page.querySelector("h1, h2, .title, .deck-title")) || doc.querySelector("h1, h2, .title, .deck-title");
        const kicker = (page && page.querySelector(".kicker, .eyebrow")) || doc.querySelector(".kicker, .eyebrow");
        return {
          title: title && title.textContent ? title.textContent.trim().replace(/\s+/g, " ").slice(0, 26) : "我的模板",
          kicker: kicker && kicker.textContent ? kicker.textContent.trim().replace(/\s+/g, " ").slice(0, 24) : ""
        };
      }

      function createCustomTemplateThumbnail(html, category = "custom") {
        try {
          const doc = new DOMParser().parseFromString(normalizeHtml(html), "text/html");
          const page = doc.querySelector(MANAGED_PAGE_SELECTOR) ||
            doc.querySelector(".slide.is-active") ||
            doc.querySelector(".slide, .page, main, section, article") ||
            doc.body;
          const styleSource = [
            ...[...doc.querySelectorAll("style")].map((style) => style.textContent || ""),
            doc.documentElement.getAttribute("style") || "",
            doc.body.getAttribute("style") || "",
            page && page.getAttribute ? page.getAttribute("style") || "" : ""
          ].join("\n");
          const fallbackBg = category === "review" ? "#f6f1eb" : category === "problem" ? "#f3f7fb" : "#0b1018";
          const bg = extractTemplateColor(styleSource, ["bg", "surface", "surface2", "background"], fallbackBg);
          const rawFg = extractTemplateColor(styleSource, ["text", "foreground"], bg === fallbackBg && fallbackBg !== "#0b1018" ? "#101010" : "#f6f8fb");
          const fg = readableTemplateTextColor(rawFg, bg);
          const accent = extractTemplateColor(styleSource, ["cyan", "green", "accent", "yellow", "orange", "purple"], category === "review" ? "#f97316" : "#22d3ee");
          const { title, kicker } = templateThumbnailText(page, doc);
          const blocks = Math.max(2, Math.min(5, page ? page.querySelectorAll("p, li, .card, .panel, .info-row, .metric, .compare-pane, .recap-grid > div").length : 2));
          const hasGrid = Boolean(page && page.querySelector(".grid, .grid-main, .two-col, .compare-grid, .recap-grid, .metrics"));
          const blockMarkup = Array.from({ length: blocks }).map((_, index) => {
            const row = Math.floor(index / (hasGrid ? 2 : 1));
            const col = hasGrid ? index % 2 : 0;
            const x = hasGrid ? 16 + col * 53 : 16;
            const y = 57 + row * 12;
            const width = hasGrid ? (index % 2 ? 36 : 44) : 83 - index * 7;
            return `<rect x="${x}" y="${y}" width="${width}" height="6" rx="2.5" fill="${fg}" opacity="${index === 0 ? ".72" : ".34"}"/>`;
          }).join("");
          const number = page && page.querySelector(".chapter-num") ? page.querySelector(".chapter-num").textContent.trim().slice(0, 2) : "";
          const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 98">
              <rect width="156" height="98" rx="12" fill="${bg}"/>
              <path d="M0 0H156V98H0Z" fill="none" stroke="${accent}" stroke-opacity=".42"/>
              <path d="M18 20H138M18 42H138M18 64H138M42 8V90M84 8V90M126 8V90" stroke="${fg}" stroke-opacity=".08" stroke-width="1"/>
              ${number ? `<text x="17" y="35" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="30" font-weight="850" fill="${accent}" opacity=".32">${escapeTemplateHtml(number)}</text>` : ""}
              <rect x="16" y="18" width="${kicker ? 54 : 76}" height="5" rx="2.5" fill="${accent}"/>
              <text x="16" y="46" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="800" fill="${fg}">${escapeTemplateHtml(title)}</text>
              ${kicker ? `<text x="16" y="82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="7" font-weight="700" fill="${fg}" opacity=".52">${escapeTemplateHtml(kicker)}</text>` : ""}
              ${blockMarkup}
            </svg>
          `.trim();
          return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
        } catch {
          return "";
        }
      }

      function parseTemplateTags(value) {
        return String(value || "")
          .split(/[,，、\s]+/)
          .map((tag) => tag.trim())
          .filter(Boolean)
          .slice(0, 6);
      }

      function readCustomTemplates() {
        try {
          const parsed = JSON.parse(localStorage.getItem(CUSTOM_TEMPLATE_KEY) || "[]");
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed
            .filter((item) => item && typeof item.html === "string" && item.html.trim())
            .map((item) => ({
              id: String(item.id || `custom-${Date.now()}`),
              name: String(item.name || "未命名模板").trim() || "未命名模板",
              category: ["problem", "decision", "review", "custom"].includes(item.category) ? item.category : "custom",
              tags: Array.isArray(item.tags) ? item.tags.map(String).filter(Boolean).slice(0, 6) : [],
              html: item.html,
              thumbnail: typeof item.thumbnail === "string" ? item.thumbnail : "",
              createdAt: item.createdAt || ""
            }));
        } catch {
          return [];
        }
      }

      function writeCustomTemplates(templates) {
        try {
          localStorage.setItem(CUSTOM_TEMPLATE_KEY, JSON.stringify(templates));
          return true;
        } catch {
          showToast("模板保存失败，可能内容太大。", true);
          return false;
        }
      }

      function customTemplateCardMarkup(template) {
        const categoryLabel = customTemplateCategoryLabel(template.category);
        const categories = ["custom", template.category].filter(Boolean).join(" ");
        const tags = [categoryLabel, ...template.tags].slice(0, 4);
        const tagsMarkup = tags.map((tag) => `<span>${escapeTemplateHtml(tag)}</span>`).join("");
        const previewClass = customTemplatePreviewClass(template.category);
        const thumbnail = createCustomTemplateThumbnail(template.html, template.category) || template.thumbnail;
        const previewMarkup = thumbnail
          ? `<span class="template-card__preview template-card__preview--image"><img src="${escapeTemplateHtml(thumbnail)}" alt=""></span>`
          : `<span class="template-card__preview ${previewClass}"><span class="template-card__blocks"><span></span><span></span><span></span></span></span>`;
        return `
          <div class="template-card template-card--custom" role="button" tabindex="0" data-template-card="custom" data-custom-template-id="${escapeTemplateHtml(template.id)}" data-template-category="${escapeTemplateHtml(categories)}">
            ${previewMarkup}
            <span>
              <span class="template-card__name">${escapeTemplateHtml(template.name)}</span>
              <span class="template-card__desc">个人保存模板</span>
              <span class="template-card__meta">${tagsMarkup}</span>
            </span>
            <button class="template-card__delete" type="button" data-delete-custom-template="${escapeTemplateHtml(template.id)}" title="删除模板" aria-label="删除模板">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        `;
      }

      function currentTemplateNameFallback(html) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const heading = doc.querySelector("h1, h2, [data-template-name]");
        return (heading && heading.textContent && heading.textContent.trim()) || doc.title || "我的模板";

      function currentTemplateHtmlForSave() {
        if (activeTextOverlay) {
          commitTextOverlay();
        }
        if (document.body.classList.contains("has-content")) {
          prepareManagedPagesForEdit(previewFrame.contentDocument);
          syncManagedPageChrome(previewFrame.contentDocument);
          renderPageManager(previewFrame.contentDocument);
          const currentPageHtml = currentManagedPageTemplateHtml(previewFrame.contentDocument);
          if (currentPageHtml) {
            return currentPageHtml;
          }
          persistPreviewToSource();
        }
        return sourceInput.value.trim();
      }

      function saveCurrentCustomTemplate() {
        const html = currentTemplateHtmlForSave();
        if (!html) {
          showToast("请先导入或选择一个模板。", true);
          return;
        }

        const nameInput = templateLibraryPopover.querySelector("#customTemplateName");
        const categoryInput = templateLibraryPopover.querySelector("#customTemplateCategory");
        const tagsInput = templateLibraryPopover.querySelector("#customTemplateTags");
        const name = String(nameInput.value || "").trim() || currentTemplateNameFallback(html);
        const category = categoryInput.value || "custom";
        const tags = parseTemplateTags(tagsInput.value);
        const templates = readCustomTemplates();
        const existingIndex = templates.findIndex((template) => template.name === name);
        const existing = existingIndex >= 0 ? templates.splice(existingIndex, 1)[0] : null;
        templates.unshift({
          id: existing ? existing.id : `custom-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
          name,
          category,
          tags,
          html,
          thumbnail: createCustomTemplateThumbnail(html, category),
          createdAt: new Date().toISOString()
        });
        if (!writeCustomTemplates(templates.slice(0, 40))) {
          return;
        }
        nameInput.value = "";
        tagsInput.value = "";
        renderCustomTemplates();
        showToast("已保存到我的模板。");
      }

      function loadCustomTemplate(id) {
        const template = readCustomTemplates().find((item) => item.id === id);
        if (!template) {
          showToast("这个模板已经不存在。", true);
          renderCustomTemplates();
          return;
        }
        closeTemplateLibrary();
        loadHtmlContent(template.html, { message: `已载入 ${template.name}。` });
      }

      function deleteCustomTemplate(id) {
        const templates = readCustomTemplates();
        const template = templates.find((item) => item.id === id);
        if (!template) {
          renderCustomTemplates();
          return;
        }
        if (!window.confirm(`删除“${template.name}”？`)) {
          return;
        }
        if (!writeCustomTemplates(templates.filter((item) => item.id !== id))) {
          return;
        }
        renderCustomTemplates();
        showToast("已删除我的模板。");
      }

      function applyTemplateLibraryFilter(value = "all") {
        if (!templateLibraryPopover) {
          return;
        }
        const filters = [...templateLibraryPopover.querySelectorAll("[data-template-filter]")];
        const cards = [...templateLibraryPopover.querySelectorAll("[data-template-card]")];
        filters.forEach((item) => item.classList.toggle("is-active", item.dataset.templateFilter === value));
        let visibleCount = 0;
        cards.forEach((card) => {
          const categories = (card.dataset.templateCategory || "").split(/\s+/);
          const visible = value === "all" || categories.includes(value);
          card.classList.toggle("is-hidden", !visible);
          if (visible) {
            visibleCount += 1;
          }
        });
        const count = templateLibraryPopover.querySelector(".template-library-count");
        if (count) {
          count.textContent = `${visibleCount} 个可用`;
        }
        const empty = templateLibraryPopover.querySelector(".template-library-empty");
        if (empty) {
          empty.hidden = readCustomTemplates().length > 0 || !["all", "custom"].includes(value);
        }
      }

        if (!templateLibraryPopover) {
          return;

        const templates = readCustomTemplates();
        const grid = templateLibraryPopover.querySelector(".custom-template-grid");
        const empty = templateLibraryPopover.querySelector(".template-library-empty");
        const customCount = templateLibraryPopover.querySelector(".custom-template-count");
        grid.innerHTML = templates.map(customTemplateCardMarkup).join("");
        empty.hidden = templates.length > 0;
        customCount.textContent = `${templates.length} 个`;
        const activeFilter = templateLibraryPopover.querySelector("[data-template-filter].is-active");
        applyTemplateLibraryFilter(activeFilter ? activeFilter.dataset.templateFilter : "all");

      function isHtmlImportFile(file) {
        return Boolean(file && (file.type === "text/html" || /\.(html?|HTML?)$/.test(file.name || "")));
      }

      function isCssImportFile(file) {
        return Boolean(file && (file.type === "text/css" || /\.css$/i.test(file.name || "")));
      }

      function safeDecodePath(value) {
        try {
          return decodeURI(value);
        } catch {
          return value;
        }
      }

      function normalizeResourcePath(value) {
        const raw = safeDecodePath(String(value || ""))
          .replace(/\\/g, "/")
          .replace(/^\/+/, "");
        const parts = [];
        raw.split("/").forEach((part) => {
          if (!part || part === ".") {
            return;
          }
          if (part === "..") {
            parts.pop();
            return;
          }
          parts.push(part);
        });
        return parts.join("/");
      }

      function fileResourcePath(file) {
        return normalizeResourcePath(file && file.webkitRelativePath ? file.webkitRelativePath : (file ? file.name : ""));
      }

      function pathDirectory(path) {
        const normalized = normalizeResourcePath(path);
        const index = normalized.lastIndexOf("/");
        return index >= 0 ? normalized.slice(0, index) : "";
      }

      function pathBasename(path) {
        const normalized = normalizeResourcePath(path);
        const index = normalized.lastIndexOf("/");
        return index >= 0 ? normalized.slice(index + 1) : normalized;
      }

      function resourceDisplayName(file) {
        return fileResourcePath(file) || (file && file.name) || "未命名 HTML";
      }

      function localResourceHref(href) {
        const raw = String(href || "").trim();
        if (!raw || /^(?:[a-z][a-z0-9+.-]*:|\/\/|#|data:|mailto:|javascript:)/i.test(raw)) {
          return "";
        }
        return raw.split("#")[0].split("?")[0];
      }

      function resolveResourcePath(baseDir, href) {
        const localHref = localResourceHref(href);
        if (!localHref) {
          return "";
        }
        return normalizeResourcePath(`${baseDir ? `${baseDir}/` : ""}${localHref}`);
      }

      function readFileText(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error(`读取失败：${file && file.name ? file.name : "文件"}`));
          reader.readAsText(file);
        });
      }

      function createImportResourceIndex(files) {
        const records = files
          .filter((file) => file && !/^\.(DS_Store|localized)$/i.test(file.name || ""))
          .map((file) => {
            const path = fileResourcePath(file);
            return {
              file,
              path,
              lowerPath: path.toLowerCase(),
              lowerName: (file.name || "").toLowerCase()
            };
          });
        const byPath = new Map();
        const byName = new Map();
        records.forEach((record) => {
          if (record.path) {
            byPath.set(record.lowerPath, record);
          }
          if (!byName.has(record.lowerName)) {
            byName.set(record.lowerName, []);
          }
          byName.get(record.lowerName).push(record);
        });
        return { records, byPath, byName };
      }

      function findImportResource(index, baseDir, href) {
        const resolved = resolveResourcePath(baseDir, href);
        if (!resolved) {
          return null;
        }
        const exact = index.byPath.get(resolved.toLowerCase());
        if (exact) {
          return exact;
        }
        const hrefPath = normalizeResourcePath(localResourceHref(href));
        const lowerHrefPath = hrefPath.toLowerCase();
        if (lowerHrefPath) {
          const suffixMatches = index.records.filter((record) => {
            return record.lowerPath === lowerHrefPath || record.lowerPath.endsWith(`/${lowerHrefPath}`);
          });
          if (suffixMatches.length === 1) {
            return suffixMatches[0];
          }
        }
        const sameName = index.byName.get(pathBasename(resolved).toLowerCase()) || [];
        return sameName.length === 1 ? sameName[0] : null;
      }

      async function inlineStylesheetsFromResources(html, htmlFile, files) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(normalizeHtml(html), "text/html");
        const htmlDir = pathDirectory(fileResourcePath(htmlFile));
        const resourceIndex = createImportResourceIndex(files);
        const links = [...doc.querySelectorAll("link[href]")].filter((link) => {
          const rel = link.getAttribute("rel") || "";
          return /\bstylesheet\b/i.test(rel);
        });
        let inlinedCount = 0;
        const missing = [];

        for (const link of links) {
          const href = link.getAttribute("href") || "";
          const resource = findImportResource(resourceIndex, htmlDir, href);
          if (!resource || !isCssImportFile(resource.file)) {
            if (localResourceHref(href)) {
              missing.push(href);
            }
            continue;
          }
          const css = await readFileText(resource.file);
          const style = doc.createElement("style");
          style.setAttribute("data-html-report-live-editor-inlined-from", href);
          style.textContent = `\n/* Inlined from ${href.replace(/\*\//g, "* /")} */\n${css}\n`;
          link.replaceWith(style);
          inlinedCount += 1;
        }

        return {
          html: `<!doctype html>\n${doc.documentElement.outerHTML}`,
          inlinedCount,
          missing
        };
      }

        pendingResourceImport = null;

      function showResourceChoice(files, htmlFiles) {

        importTextarea.value = "";
        const cssNote = result.inlinedCount > 0 ? `，已内联 ${result.inlinedCount} 个 CSS` : "";

        const htmlFile = pendingResourceImport.htmlFiles[selectedIndex];
        if (!htmlFile) {
          showToast("请选择要导入的 HTML。", true);
          return;
        }
        try {
          await importHtmlFileWithResources(htmlFile, pendingResourceImport.files);

        const files = [...(fileList || [])].filter((file) => file && !/^\.(DS_Store|localized)$/i.test(file.name || ""));

          showToast("请选择 HTML 文件或资源文件夹。", true);
          return;
        }
        const htmlFiles = files.filter(isHtmlImportFile);
        if (!htmlFiles.length) {
          showToast("没有找到 .html 或 .htm 文件。", true);
          return;
        }
        if (htmlFiles.length > 1) {
          showResourceChoice(files, htmlFiles);
          return;
        }
        try {
          await importHtmlFileWithResources(htmlFiles[0], files);

      function focusEditableAtPoint(el, x, y) {

            probe.setEnd(node, offset + 1);

      function elementDepth(el) {

      function cssColorHasPaint(value) {

        if (!match) {

      function hasVisibleBoxChrome(el, win, options = {}) {
        if (!el || !el.tagName || !win) {

        if (["img", "svg", "canvas", "video", "iframe", "object", "embed"].includes(tag)) {

      function selectedElementList() {

      function selectedTextValue(el) {

              el.setAttribute("style", patch.style);
            } else {
              el.removeAttribute("style");
            }
          }
        });
      }

      function applyVisualPatchesSoon(doc) {
        [80, 260, 700].forEach((delay) => {
          window.setTimeout(() => {
            const liveDoc = previewFrame.contentDocument;
            applyVisualPatches(liveDoc || doc);
            if (selectedElement && selectedElement.isConnected) {
              updateSelectionOverlay();
            }
          }, delay);
        });
      }

      function snapshotPreviewHtml() {
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement) {
          return "";
        }
        return cleanExportDocument(doc);
      }

      function pushHistory(label) {
        const snapshot = snapshotPreviewHtml();
        if (!snapshot || snapshot === lastHistorySnapshot) {
          return false;
        }
        historyStack.push({ label: label || "编辑", html: snapshot });
        if (historyStack.length > 80) {
          historyStack.shift();
        }
        redoStack = [];
        lastHistorySnapshot = snapshot;
        return true;
      }

      function copyElementAttributes(target, source) {
        [...target.attributes].forEach((attr) => target.removeAttribute(attr.name));
        [...source.attributes].forEach((attr) => target.setAttribute(attr.name, attr.value));
      }

      function restorePreviewHtmlInPlace(html) {
        if (previewMode !== "edit") {
          return false;
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement || !doc.head || !doc.body) {
          return false;
        }

        const parsed = new DOMParser().parseFromString(normalizeHtml(html), "text/html");
        if (!parsed || !parsed.documentElement || !parsed.head || !parsed.body) {
          return false;
        }
        disablePreviewScripts(parsed);

        const win = doc.defaultView;
        const scrollX = win.scrollX;
        const scrollY = win.scrollY;
        clearSelection();
        copyElementAttributes(doc.documentElement, parsed.documentElement);
        doc.documentElement.replaceChild(doc.importNode(parsed.head, true), doc.head);
        doc.documentElement.replaceChild(doc.importNode(parsed.body, true), doc.body);
        prepareManagedPagesForEdit(doc);
        syncManagedPageChrome(doc);
        pageKeyboardActive = false;
        previewCanvasActive = false;
        renderPageManager(doc);
        injectEditorStyle(doc);
        const editableCount = enableDirectEditing(doc);
        updateStats(editableCount, doc.images.length);
        renderStatus.textContent = "编辑预览就绪";
        win.requestAnimationFrame(() => {
          win.scrollTo(scrollX, scrollY);
          updateSelectionOverlay();
          updateManagedPageFromScroll(doc);
        });
        return true;
      }

      function undoLastChange() {
        const previous = historyStack.pop();
        if (!previous) {
          showToast("没有可撤销的操作。", true);
          return;
        }
        const current = snapshotPreviewHtml();
        if (current && current !== previous.html) {
          redoStack.push({ label: previous.label, html: current });
          if (redoStack.length > 80) {
            redoStack.shift();
          }
        }
        visualPatches.clear();
        sourceInput.value = previous.html;
        lastHistorySnapshot = "";
        if (!restorePreviewHtmlInPlace(previous.html)) {
          setPreviewMode("edit", { force: true, persist: false });
        }
        showToast(`已撤销：${previous.label}`);
      }

      function redoLastChange() {
        const next = redoStack.pop();
        if (!next) {
          showToast("没有可取消撤销的操作。", true);
          return;
        }
        const current = snapshotPreviewHtml();
        if (current && current !== next.html) {
          historyStack.push({ label: next.label, html: current });
          if (historyStack.length > 80) {
            historyStack.shift();
          }
        }
        visualPatches.clear();
        sourceInput.value = next.html;
        lastHistorySnapshot = "";
        if (!restorePreviewHtmlInPlace(next.html)) {
          setPreviewMode("edit", { force: true, persist: false });
        }
        showToast(`已取消撤销：${next.label}`);
      }

      function syncSourceFromPreview() {
        if (activeTextOverlay) {
          commitTextOverlay();
        }
        const html = snapshotPreviewHtml();
        if (!html) {
          return false;
        }
        sourceInput.value = html;
        updateStats(0, previewFrame.contentDocument && previewFrame.contentDocument.images ? previewFrame.contentDocument.images.length : 0);
        return true;
      }

      function stripEditorArtifacts(root) {
        if (!root || root.nodeType !== Node.ELEMENT_NODE) {
          return;
        }
        [root, ...root.querySelectorAll("*")].forEach((node) => {
          node.removeAttribute("data-html-report-live-editor-selected");
          node.removeAttribute("data-html-report-live-editor-moving");
          node.removeAttribute("data-html-report-live-editor-multi-selected");
          node.classList.remove("html-report-selected", "html-report-multi-selected");
          [...node.attributes].forEach((attr) => {
            if (attr.name.startsWith("data-html-report-live-editor")) {
              node.removeAttribute(attr.name);
            }
          });
        });
        root.querySelectorAll("#__html_report_resize_overlay").forEach((node) => node.remove());
        root.querySelectorAll("#__html_report_multi_select_overlay").forEach((node) => node.remove());
        root.querySelectorAll("#__html_report_smart_guides").forEach((node) => node.remove());
      }

      function enableEditingForSubtree(root) {
        if (!root || root.nodeType !== Node.ELEMENT_NODE) {
          return;
        }
      }

      function canContainInsertedBlock(el) {
        if (!el || !el.tagName) {
          return false;
        }
        const tag = el.tagName.toLowerCase();
        return ![
          "html", "head", "script", "style", "meta", "link", "title", "img", "svg", "canvas",
          "video", "audio", "iframe", "object", "embed", "input", "textarea", "select", "button",
          "br", "hr", "p", "span", "a", "b", "strong", "em", "i", "small", "code", "pre"
        ].includes(tag);
      }

      function pageLayerContainerForElement(el) {
        const doc = (el && el.ownerDocument) || previewFrame.contentDocument;
        if (!doc || !doc.body) {
          return null;
        }
        const pages = getManagedPages(doc);
        if (el && el.isConnected) {
          const managedPage = pages.find((page) => page.contains(el));
          if (managedPage) {
            return managedPage;
          }
          const explicitPage = el.closest(`${MANAGED_PAGE_SELECTOR}, .slide, .page, [data-screen-label], .dashboard, main`);
          if (explicitPage && explicitPage !== doc.body && canContainInsertedBlock(explicitPage)) {
            return explicitPage;
          }
          const bodyRoot = [...doc.body.children].find((node) => {
            return node.contains(el) && canContainInsertedBlock(node) && !isIgnoredGenericBodyChild(node);
          });
          if (bodyRoot) {
            return bodyRoot;
          }
        }
        return getCurrentManagedPage(doc) || pages[0] || doc.body;
      }

      function insertionContainer() {
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.body) {
          return null;
        }
        return pageLayerContainerForElement(selectedElement) || doc.body;
      }

      function prepareInsertionContainer(container) {
        if (!container || !container.ownerDocument || container === container.ownerDocument.body) {
          return;
        }
        const computed = container.ownerDocument.defaultView.getComputedStyle(container);
        if (computed.position === "static") {
          container.style.position = "relative";
          recordVisualPatch(container);
        }
      }

      function nextInsertionPoint(container, width, height) {
        const doc = container.ownerDocument;
        const win = doc.defaultView;
        const offset = 24 + (container.children.length % 6) * 12;
        if (container === doc.body) {
          return {
            left: Math.round(win.scrollX + Math.max(18, win.innerWidth / 2 - width / 2 + offset)),
            top: Math.round(win.scrollY + Math.max(18, win.innerHeight / 2 - height / 2 + offset))
          };
        }
        const rect = container.getBoundingClientRect();
        return {
          left: Math.round(clamp(offset, 8, Math.max(8, rect.width - width - 8))),
          top: Math.round(clamp(offset, 8, Math.max(8, rect.height - height - 8)))
        };
      }

      function pointInContainer(container, viewportLeft, viewportTop) {
        const doc = container.ownerDocument;
        const win = doc.defaultView;
        if (container === doc.body) {
          return {
            left: Math.round(win.scrollX + viewportLeft),
            top: Math.round(win.scrollY + viewportTop)
          };
        }
        const rect = container.getBoundingClientRect();
        return {
          left: Math.round(viewportLeft - rect.left + container.scrollLeft),
          top: Math.round(viewportTop - rect.top + container.scrollTop)
        };
      }

      function stripEditorMoveTransform(node) {
        const parsed = parseEditorTranslate(node.style.transform);
        if (!parsed) {
          return;
        }
        if (parsed.rest) {
          node.style.transform = parsed.rest;
        } else {
          node.style.transform = "";
        }
        node.removeAttribute("data-html-report-live-editor-base-transform");
        node.removeAttribute("data-html-report-live-editor-move-x");
        node.removeAttribute("data-html-report-live-editor-move-y");
      }

      function placeNodeInPageLayer(node, container, viewportLeft, viewportTop) {
        if (!node || !container) {
          return null;
        }
        prepareInsertionContainer(container);
        const point = pointInContainer(container, viewportLeft, viewportTop);
        stripEditorMoveTransform(node);
        node.style.position = "absolute";
        node.style.left = `${point.left}px`;
        node.style.top = `${point.top}px`;
        node.style.right = "auto";
        node.style.bottom = "auto";
        if (!Number.isFinite(Number.parseInt(node.style.zIndex, 10))) {
          node.style.zIndex = String(PAGE_LAYER_DEFAULT_Z);
        }
        node.style.boxSizing = "border-box";
        container.appendChild(node);
        return node;
      }

      function insertNodeIntoPreview(node, container, width, height) {
        if (!node || !container) {
          return null;
        }
        const anchor = selectedElement && selectedElement.isConnected && container.contains(selectedElement) && selectedElement !== container
          ? selectedElement
          : null;
        if (anchor) {
          const rect = anchor.getBoundingClientRect();
          placeNodeInPageLayer(node, container, rect.left + 24, rect.top + 24);
        } else {
          prepareInsertionContainer(container);
          const point = nextInsertionPoint(container, width, height);
          node.style.position = "absolute";
          node.style.left = `${point.left}px`;
          node.style.top = `${point.top}px`;
          node.style.right = "auto";
          node.style.bottom = "auto";
          node.style.boxSizing = "border-box";
          container.appendChild(node);
        }
        enableEditingForSubtree(node);
        selectElement(node);
        recordVisualPatch(node);
        return node;
      }

      function insertTextBoxElement() {
        if (previewMode !== "edit") {
          showToast("请先切回编辑模式。", true);
          return;
        }
        const container = insertionContainer();
        if (!container) {
          showToast("预览还没有准备好。", true);
          return;
        }
        pushHistory("插入文本");
        const doc = container.ownerDocument;
        const box = doc.createElement("div");
        box.textContent = "新文本框";
        box.setAttribute("style", [
          "width: 280px",
          "min-height: 48px",
          "padding: 12px 14px",
          "border: 1px solid rgba(16, 16, 16, .14)",
          "border-radius: 8px",
          "background: #fff",
          "color: #1c2024",
          "font: 600 18px/1.45 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
          "box-shadow: 0 10px 26px rgba(28, 32, 36, .12)",
          "z-index: 20"
        ].join("; "));
        const inserted = insertNodeIntoPreview(box, container, 280, 72);
        if (inserted) {
          syncSourceFromPreview();
          layoutControls.text.focus();
          showToast("已插入文本框。");
        }
      }

      function beginInsertImageElement() {
        if (previewMode !== "edit") {
          showToast("请先切回编辑模式。", true);
          return;
        }
        const container = insertionContainer();
        if (!container) {
          showToast("预览还没有准备好。", true);
          return;
        }
        pendingImageInsert = { container };
        activeImage = null;
        imagePicker.dataset.mode = "insert";
        imagePicker.value = "";
        imagePicker.click();
      }

      function insertImageElement(src) {
        const container = pendingImageInsert && pendingImageInsert.container && pendingImageInsert.container.isConnected
          ? pendingImageInsert.container
          : insertionContainer();
        pendingImageInsert = null;
        if (!container) {
          showToast("预览还没有准备好。", true);
          return;
        }
        pushHistory("插入图片");
        const doc = container.ownerDocument;
        const img = doc.createElement("img");
        img.alt = "Inserted image";
        img.src = src;
        img.setAttribute("style", [
          "width: 320px",
          "height: 200px",
          "object-fit: cover",
          "border-radius: 8px",
          "box-shadow: 0 10px 26px rgba(28, 32, 36, .14)",
          "z-index: 20"
        ].join("; "));
        if (insertNodeIntoPreview(img, container, 320, 200)) {
          syncSourceFromPreview();
          showToast("已插入图片。");
        }
      }

      function parseEditorTranslate(value) {
        const match = String(value || "").trim().match(/^translate\(\s*(-?\d+(?:\.\d+)?)px\s*,\s*(-?\d+(?:\.\d+)?)px\s*\)\s*(.*)$/i);
        if (!match) {
          return null;
        }
        return {
          x: Number(match[1]) || 0,
          y: Number(match[2]) || 0,
          rest: match[3] || ""
        };
      }

      function startElementMove(el, event) {
        if (!canSelectElement(el) || previewMode !== "edit") {
          return;
        }

        event.preventDefault();
        event.stopPropagation();

        const doc = el.ownerDocument;
        const win = doc.defaultView;
        const movingElements = selectedElements.has(el) && selectionCount() > 1
          ? selectedElementList()
          : [el];
        const ignored = new Set(movingElements);
        const guideRect = unionRects(movingElements.map((node) => node.getBoundingClientRect()));
        const startX = event.clientX;
        const startY = event.clientY;
        const previousUserSelect = doc.documentElement.style.userSelect;
        let moveFrame = 0;
        let pendingDx = 0;
        let pendingDy = 0;
        let dragStarted = false;
        let activeMoveGuides = [];

        movingElements.forEach((node) => node.setAttribute("data-html-report-live-editor-moving", "true"));
        doc.documentElement.style.userSelect = "none";

        if (event.target.setPointerCapture) {
          try {
            event.target.setPointerCapture(event.pointerId);
          } catch (_) {}
        }

        const moveStates = movingElements.map((node) => {
          const nodeRect = node.getBoundingClientRect();
          const computed = win.getComputedStyle(node);
          const positioned = computed.position === "absolute" || computed.position === "fixed";
          let startLeft = parseFloat(computed.left);
          let startTop = parseFloat(computed.top);
          let startMoveX = 0;
          let startMoveY = 0;
          let baseTransform = "";

          if (positioned) {
            if (!Number.isFinite(startLeft) || !Number.isFinite(startTop)) {
              if (computed.position === "fixed") {
                startLeft = nodeRect.left;
                startTop = nodeRect.top;
              } else {
                const parentRect = node.offsetParent ? node.offsetParent.getBoundingClientRect() : { left: 0, top: 0 };
                startLeft = nodeRect.left - parentRect.left;
                startTop = nodeRect.top - parentRect.top;
              }
              node.style.left = `${Math.round(startLeft)}px`;
              node.style.top = `${Math.round(startTop)}px`;
            }
            node.style.right = "auto";
            node.style.bottom = "auto";
          } else {
            const parsed = parseEditorTranslate(node.style.transform);
            if (!node.dataset.htmlReportLiveEditorBaseTransform) {
              node.dataset.htmlReportLiveEditorBaseTransform = parsed ? parsed.rest : (node.style.transform || "");
            }
            if (!node.dataset.htmlReportLiveEditorMoveX) {
              node.dataset.htmlReportLiveEditorMoveX = String(parsed ? parsed.x : 0);
              node.dataset.htmlReportLiveEditorMoveY = String(parsed ? parsed.y : 0);
            }
            startMoveX = Number(node.dataset.htmlReportLiveEditorMoveX) || 0;
            startMoveY = Number(node.dataset.htmlReportLiveEditorMoveY) || 0;
            baseTransform = node.dataset.htmlReportLiveEditorBaseTransform || "";
          }
          return { node, positioned, startLeft, startTop, startMoveX, startMoveY, baseTransform };
        });

        function paintMove() {
          moveFrame = 0;
          moveStates.forEach((state) => {
            if (state.positioned) {
              state.node.style.left = `${Math.round(state.startLeft + pendingDx)}px`;
              state.node.style.top = `${Math.round(state.startTop + pendingDy)}px`;
            } else {
              const nextX = state.startMoveX + pendingDx;
              const nextY = state.startMoveY + pendingDy;
              state.node.dataset.htmlReportLiveEditorMoveX = String(Math.round(nextX));
              state.node.dataset.htmlReportLiveEditorMoveY = String(Math.round(nextY));
              state.node.style.transform = `translate(${Math.round(nextX)}px, ${Math.round(nextY)}px)${state.baseTransform ? ` ${state.baseTransform}` : ""}`;
            }
          });
          updateSelectionOverlay();
          renderSmartGuides(doc, activeMoveGuides);
        }

        function move(moveEvent) {
          moveEvent.preventDefault();
          const dx = moveEvent.clientX - startX;
          const dy = moveEvent.clientY - startY;
          if (!dragStarted) {
            if (Math.hypot(dx, dy) < 3) {
              return;
            }
            dragStarted = true;
            pushHistory("移动组件");
          }
          const guided = smartGuidesForMove(el, {
            left: guideRect.left + dx,
            top: guideRect.top + dy,
            width: guideRect.width,
            height: guideRect.height
          }, moveEvent.altKey, ignored);
          activeMoveGuides = guided.guides;
          pendingDx = guided.rect.left - guideRect.left;
          pendingDy = guided.rect.top - guideRect.top;
          if (!moveFrame) {
            moveFrame = win.requestAnimationFrame(paintMove);
          }
        }

        function up(upEvent) {
          upEvent.preventDefault();
          if (moveFrame) {
            win.cancelAnimationFrame(moveFrame);
            paintMove();
          }
          movingElements.forEach((node) => node.removeAttribute("data-html-report-live-editor-moving"));
          doc.documentElement.style.userSelect = previousUserSelect;
          doc.removeEventListener("pointermove", move, true);
          doc.removeEventListener("pointerup", up, true);
          doc.removeEventListener("pointercancel", up, true);
          hideSmartGuides(doc);
          if (dragStarted) {
            movingElements.forEach(recordVisualPatch);
            syncSourceFromPreview();
            readLayoutControls();
          }
        }

        doc.addEventListener("pointermove", move, true);
        doc.addEventListener("pointerup", up, true);
        doc.addEventListener("pointercancel", up, true);
      }

      function offsetCloneFromSource(clone, source, distance = 24) {
        const container = pageLayerContainerForElement(source);
        const rect = source.getBoundingClientRect();
        return placeNodeInPageLayer(clone, container, rect.left + distance, rect.top + distance);
      }

      function placeInsertedClone(clone, target, index = 0, distance = 24) {
        const doc = previewFrame.contentDocument;
        const container = pageLayerContainerForElement(target) || pageLayerContainerForElement(clone) || (doc && doc.body);
        if (!container) {
          return null;
        }
        const offset = distance * (index + 1);
        if (target && target.isConnected) {
          const rect = target.getBoundingClientRect();
          return placeNodeInPageLayer(clone, container, rect.left + offset, rect.top + offset);
        }
        const win = container.ownerDocument.defaultView;
        return placeNodeInPageLayer(clone, container, Math.max(18, win.innerWidth / 2 - 140 + offset), Math.max(18, win.innerHeight / 2 - 36 + offset));
      }

      function duplicateSelectedElement() {
        const selectedList = selectedElementList();
        if (!selectedList.length) {
          showToast("请先选中一个组件。", true);
          return;
        }
        pushHistory(selectedList.length > 1 ? "复制多个组件" : "复制组件");
        const clones = selectedList.map((source) => {
          const clone = source.cloneNode(true);
          stripEditorArtifacts(clone);
          if (!offsetCloneFromSource(clone, source)) {
            return null;
          }
          enableEditingForSubtree(clone);
          recordVisualPatch(clone);
          return clone;
        }).filter(Boolean);
        clearSelectionMarkers();
        selectedElements = new Set(clones);
        selectedElement = clones[0] || null;
        refreshSelectionMarkers();
        layoutPanel.hidden = false;
        readLayoutControls();
        syncSourceFromPreview();
        showToast(selectedList.length > 1 ? "已复制选中的多个组件。" : "已复制当前组件。");
      }

      function cloneSelectedToClipboard() {
        const selectedList = selectedElementList();
        if (!selectedList.length) {
          showToast("请先选中一个组件。", true);
          return false;
        }
        clipboardElements = selectedList.map((el) => {
          const clone = el.cloneNode(true);
          stripEditorArtifacts(clone);
          return clone;
        });
        clipboardElement = clipboardElements.length === 1 ? clipboardElements[0] : null;
        showToast(selectedList.length > 1 ? "已复制多个组件到内部剪贴板。" : "已复制到内部剪贴板。");
        return true;
      }

      function pasteClipboardElement() {
        const sourceClips = clipboardElements && clipboardElements.length
          ? clipboardElements
          : (clipboardElement ? [clipboardElement] : []);
        if (!sourceClips.length) {
          showToast("还没有复制组件。", true);
          return;
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.body) {
          showToast("预览还没有准备好。", true);
          return;
        }
        pushHistory(sourceClips.length > 1 ? "粘贴多个组件" : "粘贴组件");
        const target = selectedElement && selectedElement.isConnected ? selectedElement : null;
        const clones = sourceClips.map((clip, index) => {
          const clone = clip.cloneNode(true);
          stripEditorArtifacts(clone);
          if (!placeInsertedClone(clone, target, index, 24)) {
            return null;
          }
          enableEditingForSubtree(clone);
          recordVisualPatch(clone);
          return clone;
        }).filter(Boolean);
        clearSelectionMarkers();
        selectedElements = new Set(clones);
        selectedElement = clones[0] || null;
        refreshSelectionMarkers();
        readLayoutControls();
        syncSourceFromPreview();
        showToast(sourceClips.length > 1 ? "已粘贴多个组件。" : "已粘贴组件。");
      }

      function layerZIndex(el) {
        const raw = el.style.zIndex || el.ownerDocument.defaultView.getComputedStyle(el).zIndex;
        const parsed = Number.parseInt(raw, 10);
        return Number.isFinite(parsed) ? parsed : PAGE_LAYER_DEFAULT_Z;
      }

      function isPageLayerItem(el, container) {
        if (!el || el.parentElement !== container || !canSelectElement(el)) {
          return false;
        }
        const position = el.ownerDocument.defaultView.getComputedStyle(el).position;
        return position === "absolute" || position === "fixed";
      }

      function pageLayerItems(container) {
        return [...container.children]
          .filter((node) => isPageLayerItem(node, container))
          .map((node, index) => ({ node, index, z: layerZIndex(node) }));
      }

      function sortedLayerItems(items) {
        return [...items].sort((a, b) => {
          if (a.z !== b.z) {
            return a.z - b.z;
          }
          return a.index - b.index;
        });
      }

      function setLayerZIndex(el, value) {
        el.style.zIndex = String(Math.max(PAGE_LAYER_MIN_Z, Math.round(value)));
        recordVisualPatch(el);
      }

      function adjustSelectedLayer(action) {
        const selectedList = selectedElementList();
        if (!selectedList.length) {
          showToast("请先选中一个组件。", true);
          return;
        }

        const container = pageLayerContainerForElement(selectedList[0]);
        if (!container) {
          showToast("当前页面不支持层级调整。", true);
          return;
        }
        const selectedSet = new Set(selectedList);
        if (selectedList.some((node) => !isPageLayerItem(node, container))) {
          showToast("层级调整只作用于页面层的自由组件。", true);
          return;
        }

        const items = pageLayerItems(container);
        if (items.length <= selectedList.length) {
          showToast("当前页面层没有其他可调整组件。", true);
          return;
        }

        const selectedItems = sortedLayerItems(items.filter((item) => selectedSet.has(item.node)));
        const sortedItems = sortedLayerItems(items);
        const maxZ = Math.max(...items.map((item) => item.z), PAGE_LAYER_DEFAULT_Z);
        const minZ = Math.min(...items.map((item) => item.z), PAGE_LAYER_DEFAULT_Z);
        let changed = false;
        let historyPushed = false;
        const pushLayerHistory = () => {
          if (!historyPushed) {
            pushHistory("调整层级");
            historyPushed = true;
          }
        };

        if (action === "front") {
          pushLayerHistory();
          selectedItems.forEach((item, index) => setLayerZIndex(item.node, maxZ + index + 1));
          changed = true;
        } else if (action === "back") {
          pushLayerHistory();
          const startZ = Math.max(PAGE_LAYER_MIN_Z, minZ - selectedItems.length);
          selectedItems.forEach((item, index) => setLayerZIndex(item.node, startZ + index));
          changed = true;
        } else if (action === "forward") {
          const selectedRanks = selectedItems.map((item) => sortedItems.findIndex((entry) => entry.node === item.node));
          const target = sortedItems.find((item, index) => index > Math.max(...selectedRanks) && !selectedSet.has(item.node));
          if (!target) {
            showToast("已经在最上层。");
          } else {
            pushLayerHistory();
            selectedItems.forEach((item, index) => setLayerZIndex(item.node, target.z + index + 1));
            changed = true;
          }
        } else if (action === "backward") {
          const selectedRanks = selectedItems.map((item) => sortedItems.findIndex((entry) => entry.node === item.node));
          const before = sortedItems
            .filter((item, index) => index < Math.min(...selectedRanks) && !selectedSet.has(item.node))
            .pop();
          if (!before) {
            showToast("已经在最下层。");
          } else {
            pushLayerHistory();
            const startZ = Math.max(PAGE_LAYER_MIN_Z, before.z - selectedItems.length);
            selectedItems.forEach((item, index) => setLayerZIndex(item.node, startZ + index));
            changed = true;
          }
        }

        if (!changed) {
          return;
        }
        syncSourceFromPreview();
        updateSelectionOverlay();
        readLayoutControls();
        showToast({
          front: "已置顶。",
          forward: "已上移一层。",
          backward: "已下移一层。",
          back: "已置底。"
        }[action] || "已调整层级。");
      }

      function deleteSelectedElement() {
        const selectedList = selectedElementList();
        if (!selectedList.length) {
          showToast("请先选中一个组件。", true);
          return;
        }
        pushHistory(selectedList.length > 1 ? "删除多个组件" : "删除组件");
        const doc = selectedList[0].ownerDocument;
        clearSelection();
        selectedList.forEach((target) => target.remove());
        hideResizeOverlay(doc);
        syncSourceFromPreview();
        showToast(selectedList.length > 1 ? "已删除选中的多个组件，可按 Command+Z 撤销。" : "已删除组件，可按 Command+Z 撤销。");
      }

      function moveElementByDelta(el, dx, dy) {
        if (!el || !el.isConnected) {
          return false;
        }
        const win = el.ownerDocument.defaultView;
        const rect = el.getBoundingClientRect();
        const computed = win.getComputedStyle(el);
        const positioned = computed.position === "absolute" || computed.position === "fixed";
        if (positioned) {
          let left = parseFloat(computed.left);
          let top = parseFloat(computed.top);
          if (!Number.isFinite(left) || !Number.isFinite(top)) {
            if (computed.position === "fixed") {
              left = rect.left;
              top = rect.top;
            } else {
              const parentRect = el.offsetParent ? el.offsetParent.getBoundingClientRect() : { left: 0, top: 0 };
              left = rect.left - parentRect.left;
              top = rect.top - parentRect.top;
            }
          }
          el.style.left = `${Math.round(left + dx)}px`;
          el.style.top = `${Math.round(top + dy)}px`;
          el.style.right = "auto";
          el.style.bottom = "auto";
        } else {
          const parsed = parseEditorTranslate(el.style.transform);
          const baseTransform = el.dataset.htmlReportLiveEditorBaseTransform || (parsed ? parsed.rest : (el.style.transform || ""));
          const x = (Number(el.dataset.htmlReportLiveEditorMoveX) || (parsed ? parsed.x : 0)) + dx;
          const y = (Number(el.dataset.htmlReportLiveEditorMoveY) || (parsed ? parsed.y : 0)) + dy;
          el.dataset.htmlReportLiveEditorBaseTransform = baseTransform;
          el.dataset.htmlReportLiveEditorMoveX = String(Math.round(x));
          el.dataset.htmlReportLiveEditorMoveY = String(Math.round(y));
          el.style.transform = `translate(${Math.round(x)}px, ${Math.round(y)}px)${baseTransform ? ` ${baseTransform}` : ""}`;
        }
        recordVisualPatch(el);
        updateSelectionOverlay();
        return true;
      }

      function nudgeSelectedElement(dx, dy) {
        if (!selectedElement || !selectedElement.isConnected || previewMode !== "edit") {
          return;
        }
        pushHistory("移动组件");
        const moved = selectedElementList().map((el) => moveElementByDelta(el, dx, dy)).some(Boolean);
        if (moved) {
          syncSourceFromPreview();
          readLayoutControls();
        }
      }

      function isTypingTarget(target) {
        if (!target) {
          return false;
        }
        const tag = target.tagName ? target.tagName.toLowerCase() : "";
        return target.isContentEditable || ["input", "textarea", "select"].includes(tag);
      }

      function selectEditableContents(target) {
        const base = eventTargetElement(target);
        const activeRoot =
          activeTextEditRoot &&
          canEditTextElement(activeTextEditRoot)
            ? activeTextEditRoot
            : null;
        const selectedRoot =
          selectedElement &&
          textRootContains(selectedElement, base) &&
          canEditTextElement(selectedElement)
            ? selectedElement
            : null;
        const editable = activeRoot || selectedRoot || (base && base.closest ? base.closest("[contenteditable='true']") : null);
        if (!editable) {
          return false;
        }
        const doc = editable.ownerDocument;
        const selection = doc.defaultView.getSelection();
        if (!selection) {
          return false;
        }
        editable.focus({ preventScroll: true });
        const range = doc.createRange();
        range.selectNodeContents(editable);
        selection.removeAllRanges();
        selection.addRange(range);
        selectElement(editable);
        return true;
      }

      function handleEditorKeydown(event) {
        const isMeta = event.metaKey || event.ctrlKey;
        const key = event.key;
        const targetElement = event.target && event.target.nodeType === 1 && typeof event.target.closest === "function" ? event.target : null;
        const isInspectorControl = Boolean(targetElement && targetElement.closest(".layout-panel"));
        const typing = isTypingTarget(event.target);
        const isPreviewDoc = event.target && event.target.ownerDocument === previewFrame.contentDocument;
        const targetTag = event.target && event.target.tagName ? event.target.tagName.toLowerCase() : "";
        const isNativeField = ["input", "textarea", "select"].includes(targetTag);
        const isTextOverlayTarget = event.target === textEditOverlay;
        const isSourceEditingTarget = Boolean(targetElement && targetElement.closest(".source-pane, .import-screen"));
        const canUseEditorHistoryShortcut =
          !isSourceEditingTarget &&
          !(isTextOverlayTarget && activeTextOverlay) &&
          (!isNativeField || isInspectorControl || isPreviewDoc);

        if (isMeta && key.toLowerCase() === "a" && activeTextEditRoot && activeTextEditRoot.isConnected && !isNativeField) {
          if (selectEditableContents(activeTextEditRoot)) {
            event.preventDefault();
            event.stopPropagation();
          }
          return;
        }

        if (isMeta && key.toLowerCase() === "a" && isPreviewDoc) {
          if (selectEditableContents(event.target)) {
            event.preventDefault();
            event.stopPropagation();
          }
          return;
        }

        if (isMeta && key.toLowerCase() === "z" && !event.shiftKey && canUseEditorHistoryShortcut) {
          event.preventDefault();
          event.stopPropagation();
          undoLastChange();
          return;
        }

        if (isMeta && key.toLowerCase() === "z" && event.shiftKey && canUseEditorHistoryShortcut) {
          event.preventDefault();
          event.stopPropagation();
          redoLastChange();
          return;
        }

        const canUseTypographyShortcut = selectedElement &&
          selectedElement.isConnected &&
          (isPreviewDoc || isTextOverlayTarget || (!isInspectorControl && !isTypingTarget(event.target)));
        if (isMeta && key.toLowerCase() === "b" && canUseTypographyShortcut) {
          event.preventDefault();
          event.stopPropagation();
          toggleTypographyStyle("bold");
          return;
        }

        if (typing) {
          return;
        }

        if (isMeta && key.toLowerCase() === "c") {
          event.preventDefault();
          cloneSelectedToClipboard();
          return;
        }

        if (isMeta && key.toLowerCase() === "v") {
          event.preventDefault();
          pasteClipboardElement();
          return;
        }

        if (isMeta && key.toLowerCase() === "d") {
          event.preventDefault();
          duplicateSelectedElement();
          return;
        }

        if (key === "Delete" || key === "Backspace") {
          event.preventDefault();
          deleteSelectedElement();
          return;
        }

        if (key === "Escape") {
          event.preventDefault();
          if (formatPainterState) {
            stopFormatPainter();
            return;
          }
          clearSelection();
          return;
        }
