      function clearManagedPageForNewPage(page) {
        page.classList.remove("is-active");
        const textNodes = [...page.querySelectorAll("h1, h2, h3, p, li, span, td, .tag, .pill, .badge, .chip")];
        let titleDone = false;
        textNodes.forEach((node) => {
          if (node.matches("h1, h2") && !titleDone) {
            node.textContent = "新页面标题";
            titleDone = true;

          }
          if (node.matches(".kicker, .eyebrow")) {
            node.textContent = "自定义页面";

          if (node.matches(".status, .tag, .pill, .badge")) {

          node.textContent = "点击修改这里的内容。";
        });
        page.querySelectorAll('img[alt="Inserted image"]').forEach((img) => img.remove());
        page.querySelectorAll("ul, ol").forEach((list) => {
          [...list.children].slice(1).forEach((item) => item.remove());
        });
      }

      function cleanupManagedPageClone(page) {
        page.querySelectorAll("#__html_report_resize_overlay, #__html_report_multi_select_overlay, #__html_report_smart_guides").forEach((node) => node.remove());
        page.querySelectorAll("[data-html-report-live-editor-selected]").forEach((node) => node.removeAttribute("data-html-report-live-editor-selected"));
        page.querySelectorAll(".html-report-selected, .html-report-multi-selected").forEach((node) => {
          node.classList.remove("html-report-selected", "html-report-multi-selected");
        });
      }

      function copyManagedPageToClipboard() {
        const doc = previewFrame.contentDocument;
        const page = getCurrentManagedPage(doc);
        if (!doc || !page) {
          return;
        }
        const clone = page.cloneNode(true);
        cleanupManagedPageClone(clone);
        managedPageClipboard = clone;
        showToast(`已复制页面：第 ${String(activeManagedPageIndex + 1).padStart(2, "0")} 页。`);
      }

      function pasteManagedPageFromClipboard() {
        const doc = previewFrame.contentDocument;
        const page = getCurrentManagedPage(doc);
        if (!doc || !page) {
          return;
        }
        if (!managedPageClipboard) {
          showToast("先用 Command+C 复制页面。", true);
          return;
        }
        const clone = managedPageClipboard.cloneNode(true);
        cleanupManagedPageClone(clone);
        pushHistory("粘贴页面");
        page.insertAdjacentElement("afterend", clone);
        refreshPageManagerAfterChange(doc, activeManagedPageIndex + 1, "已粘贴页面。");
      }

      function renumberManagedPages(doc) {
        const pages = getManagedPages(doc);
        pages.forEach((page, index) => {
          const pageNumber = String(index + 1).padStart(2, "0");
          const walker = doc.createTreeWalker(page, NodeFilter.SHOW_TEXT);
          const nodes = [];
          while (walker.nextNode()) {
            nodes.push(walker.currentNode);
          }
          nodes.forEach((node) => {
            node.nodeValue = node.nodeValue
              .replace(/第\s*\d{1,2}\s*页/g, `第 ${pageNumber} 页`)
              .replace(/PAGE\s+\d{1,2}/gi, `PAGE ${pageNumber}`);
          });
          normalizeManagedPageIdentity(page, index);
        });
      }

      function refreshPageManagerAfterChange(doc, activeIndex, message) {
        renumberManagedPages(doc);
        renderPageManager(doc);
        injectEditorStyle(doc);
        syncManagedPageChrome(doc);
        setActiveManagedPage(activeIndex);
        window.requestAnimationFrame(() => {
          scrollPreviewToManagedPage(activeIndex);
          window.setTimeout(() => setActiveManagedPage(activeIndex), 80);
        });
        if (typeof schedulePreviewFrameResize === "function") {
          schedulePreviewFrameResize(doc);
        }
        syncSourceFromPreview();
        showToast(message);
      }

      function runPageManagerAction(action) {
        const doc = previewFrame.contentDocument;
        prepareManagedPagesForEdit(doc);
        const pages = getManagedPages(doc);
        const currentPage = getCurrentManagedPage(doc);
        if (!doc || !currentPage) {
          return;
        }
        if (action === "delete") {
          if (pages.length <= 1) {
            showToast("至少需要保留 1 页。", true);
            return;
          }
          const nextIndex = Math.max(0, Math.min(activeManagedPageIndex, pages.length - 2));
          pushHistory("删除页面");
          currentPage.remove();
          refreshPageManagerAfterChange(doc, nextIndex, "已删除页面。");
          return;
        }
        if (action === "duplicate") {
          const clone = currentPage.cloneNode(true);
          cleanupManagedPageClone(clone);
          pushHistory("复制页面");
          currentPage.insertAdjacentElement("afterend", clone);
          refreshPageManagerAfterChange(doc, activeManagedPageIndex + 1, "已复制页面。");
          return;
        }
        if (action === "new") {
          const nextIndex = activeManagedPageIndex + 1;
          const page = currentPage.matches(PM_TEMPLATE_PAGE_SELECTOR)
            ? createBlankPmTemplatePage(doc, nextIndex)
            : currentPage.cloneNode(true);
          cleanupManagedPageClone(page);
          if (!currentPage.matches(PM_TEMPLATE_PAGE_SELECTOR)) {
            clearManagedPageForNewPage(page);
          }
          pushHistory("新建页面");
          currentPage.insertAdjacentElement("afterend", page);
          refreshPageManagerAfterChange(doc, nextIndex, "已新建页面。");
        }
      }

      function isTypingShortcutTarget(target) {
        if (!target || target.nodeType !== 1 || typeof target.closest !== "function") {
          return false;
        }
        return Boolean(target.closest("input, textarea, select, [contenteditable]:not([contenteditable='false'])"));
      }

      function handleManagedPageShortcut(event) {
        if (!app.classList.contains("pm-template-edit-visible") || !event.metaKey || event.ctrlKey || event.altKey) {
          return;
        }
        const key = event.key.toLowerCase();
        if (!["c", "v"].includes(key)) {
          return;
        }
        const target = event.target && event.target.nodeType === 1 && typeof event.target.closest === "function" ? event.target : null;
        if (isTypingShortcutTarget(target)) {
          return;
        }
        if (target && target.closest(".source-pane, .layout-panel textarea, .layout-panel input")) {
          return;
        }
        if (!pageKeyboardActive) {
          return;
        }
        event.preventDefault();
        event.stopImmediatePropagation();
        if (key === "c") {
          copyManagedPageToClipboard();
          return;
        }
        pasteManagedPageFromClipboard();
      }

      function updateManagedPageFromScroll(doc) {
        const pages = getManagedPages(doc);
        if (!pages.length) {
          return;
        }
        const viewportAnchor = 96;
        let activeIndex = 0;
        let bestDistance = Number.POSITIVE_INFINITY;
        pages.forEach((page, index) => {
          const distance = Math.abs(page.getBoundingClientRect().top - viewportAnchor);
          if (distance < bestDistance) {
            bestDistance = distance;
            activeIndex = index;
          }
        });
        setActiveManagedPage(activeIndex);
      }

      function renderPageManager(doc) {
        ensurePageManager();
        const pages = getManagedPages(doc);
        pageManager.hidden = !pages.length;
        pageManager.querySelector(".page-manager__meta").textContent = `${pages.length} 页`;
        pageManagerList.innerHTML = "";
        pages.forEach((page, index) => {
          const item = document.createElement("div");
          item.className = "page-manager__item";
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.setAttribute("draggable", "true");
          item.innerHTML = `
            ${pageThumbnailMarkup(page, index)}
            <span class="page-manager__body">
              <span class="page-manager__num">${String(index + 1).padStart(2, "0")}</span>
              <span class="page-manager__label"></span>
            </span>
          `;
          const label = item.querySelector(".page-manager__label");
          label.textContent = getPageLabel(page, index);
          label.title = "双击重命名";
          label.addEventListener("dblclick", (event) => {
            event.preventDefault();
            event.stopPropagation();
            pageKeyboardActive = true;
            clearSelection();
            startRenameManagedPage(index, label);
          });
          item.addEventListener("click", (event) => {
            if (pageDragJustFinished || event.target.closest(".page-manager__rename")) {
              return;
            }
            pageKeyboardActive = true;
            clearSelection();
            scrollPreviewToManagedPage(index);
          });
          item.addEventListener("keydown", (event) => {
            if (event.target.closest(".page-manager__rename")) {
              return;
            }
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              pageKeyboardActive = true;
              clearSelection();
              scrollPreviewToManagedPage(index);
            }
            if (event.key === "F2") {
              event.preventDefault();
              pageKeyboardActive = true;
              clearSelection();
              startRenameManagedPage(index, item.querySelector(".page-manager__label"));
            }
          });
          item.addEventListener("dragstart", (event) => {
            draggingManagedPageIndex = index;
            pageKeyboardActive = true;
            clearSelection();
            item.classList.add("is-dragging");
            event.dataTransfer.effectAllowed = "move";
            event.dataTransfer.setData("text/plain", String(index));
          });
          item.addEventListener("dragover", (event) => {
            if (draggingManagedPageIndex === null || draggingManagedPageIndex === index) {
              return;
            }
            event.preventDefault();
            updatePageDragAutoScroll(event.clientY);
            const rect = item.getBoundingClientRect();
            const position = event.clientY < rect.top + rect.height / 2 ? "before" : "after";
            clearPageDropMarkers();
            item.classList.add(position === "before" ? "is-drop-before" : "is-drop-after");
            item.dataset.dropPosition = position;
          });
          item.addEventListener("dragleave", () => {
            item.classList.remove("is-drop-before", "is-drop-after");
            item.removeAttribute("data-drop-position");
          });
          item.addEventListener("drop", (event) => {
            event.preventDefault();
            event.stopPropagation();
            stopPageDragAutoScroll();
            const fromIndex = Number(event.dataTransfer.getData("text/plain"));
            const position = item.dataset.dropPosition || "after";
            pageDragJustFinished = true;
            moveManagedPage(Number.isFinite(fromIndex) ? fromIndex : draggingManagedPageIndex, index, position);
            draggingManagedPageIndex = null;
            window.setTimeout(() => {
              pageDragJustFinished = false;
            }, 0);
          });
          item.addEventListener("dragend", () => {
            draggingManagedPageIndex = null;
            stopPageDragAutoScroll();
            clearPageDropMarkers();
          });
          pageManagerList.appendChild(item);
        });
        setActiveManagedPage(pages.length ? Math.min(activeManagedPageIndex, pages.length - 1) : 0);
      }

      function cleanExportDocument(doc, options = {}) {
        const clone = doc.documentElement.cloneNode(true);
        if (typeof options.prepareClone === "function") {
          options.prepareClone(clone);
        }
        clone.style.cursor = "";
        clone.classList.remove(
          "html-report-live-editor-pm-template",
          "html-report-live-editor-managed-document",
          "html-report-live-editor-paged-document"
        );
        if (options.stripScripts) {
          clone.querySelectorAll("script").forEach((script) => script.remove());
        } else {
          restorePreviewScripts(clone);
        }

        clone.querySelectorAll([
          "#__html_report_live_editor_style",
          "#__html_report_resize_overlay",
          "#__html_report_multi_select_overlay",
          "#__html_report_smart_guides"
        ].join(",")).forEach((node) => node.remove());

        clone.querySelectorAll("[data-html-report-live-editor-tabindex]").forEach((node) => node.removeAttribute("tabindex"));

        [clone, ...clone.querySelectorAll("*")].forEach((node) => {
          node.removeAttribute("contenteditable");
          node.removeAttribute("spellcheck");
          node.removeAttribute("data-html-report-managed-page");
          node.classList.remove("html-report-selected", "html-report-multi-selected");
          [...node.attributes].forEach((attr) => {
            if (attr.name.startsWith("data-html-report-live-editor")) {
              node.removeAttribute(attr.name);
            }
          });
          if (node.getAttribute("class") === "") {
            node.removeAttribute("class");
          }
          if (node.getAttribute("style") === "") {
            node.removeAttribute("style");
          }
        });

        return `<!doctype html>\n${clone.outerHTML}`;
      }

      function exportHtml() {
        if (activeTextOverlay) {
          commitTextOverlay();
        }
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.documentElement) {
          showToast("预览还没有准备好。", true);
          return;
        }

        const html = cleanExportDocument(doc);
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.htmlReportLiveEditorSave) {
          window.webkit.messageHandlers.htmlReportLiveEditorSave.postMessage({
            filename: "edited_presentation.html",
            html
          });
          showToast("请选择保存位置。");
          return;
        }
        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "edited_presentation.html";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 400);
        showToast("已导出 edited_presentation.html");
      }

      sourceInput.addEventListener("input", () => {
        updateStats(0, previewFrame.contentDocument && previewFrame.contentDocument.images ? previewFrame.contentDocument.images.length : 0);
      });

      document.addEventListener("click", (event) => {
        if (!formatPainterMenu.hidden && !event.target.closest(".format-painter")) {
          hideFormatPainterMenu();
        }
        if (templateLibraryPopover && !templateLibraryPopover.hidden && !event.target.closest(".template-library-popover") && !event.target.closest("#templateLibraryButton")) {
          closeTemplateLibrary();
        }
        if (typographyPresetPopover && !typographyPresetPopover.hidden && !event.target.closest(".typography-preset-popover") && !event.target.closest("#typographyPresetButton")) {
          closeTypographyPreset();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && formatPainterState) {
          event.preventDefault();
          stopFormatPainter();
        }
      });

      previewFrame.addEventListener("mouseenter", refreshFormatPainterCursorFromFrameEvent);
      previewFrame.addEventListener("mousemove", refreshFormatPainterCursorFromFrameEvent);
      document.querySelector(".preview-shell").addEventListener("pointerdown", () => {
        previewCanvasActive = true;
        pageKeyboardActive = false;
      }, true);
      layoutPanel.addEventListener("pointerdown", () => {
        previewCanvasActive = false;
        pageKeyboardActive = false;
      }, true);
      document.querySelector(".preview-shell").addEventListener("wheel", forwardWheelToPreviewFrame, { passive: false });
      document.addEventListener("wheel", forwardWheelToPreviewFrame, { passive: false });
      document.addEventListener("keydown", handleManagedPageShortcut, true);

      previewFrame.addEventListener("load", () => {
        const doc = previewFrame.contentDocument;
        if (!doc || !doc.body) {
          previewFrame.style.pointerEvents = "";
          renderStatus.textContent = "预览不可用";
          showToast("无法访问预览内容。", true);
          return;
        }
        const editBootstrapId = previewFrame.dataset.editBootstrapId;
        if (previewMode === "edit" && editBootstrapId) {
          renderStatus.textContent = "正在初始化布局...";
          window.clearTimeout(editBootstrapTimer);
          editBootstrapTimer = window.setTimeout(() => {
            freezeBootstrappedEditPreview(editBootstrapId);
          }, EDIT_BOOTSTRAP_DELAY);
          return;
        }

        previewFrame.style.pointerEvents = "";
        prepareManagedPagesForEdit(doc);
        const hasManagedPages = syncManagedPageChrome(doc);
        renderPageManager(doc);
        doc.addEventListener("pointerdown", () => {
          if (previewMode === "edit" && hasManagedPages) {
            previewCanvasActive = true;
            pageKeyboardActive = false;
          }
        }, true);
        doc.addEventListener("wheel", (event) => {
          if (previewMode === "edit" && hasManagedPages) {
            previewCanvasActive = true;
            scrollPreviewDocumentByWheel(event, doc, doc.defaultView);
          }
        }, { passive: false });
        doc.addEventListener("keydown", handleManagedPageShortcut, true);

        if (previewMode === "edit") {
          injectEditorStyle(doc);
          updateFormatPainterCursor();
          applyVisualPatches(doc);
          const editableCount = enableDirectEditing(doc);
          const imageCount = doc.images.length;
          bindPreviewEvents(doc);
          doc.addEventListener("input", (event) => {
            const edited = event.target && event.target.closest ? event.target.closest(EDITABLE_SELECTOR) : null;
            if (edited) {
              recordVisualPatch(edited);
            }
            if (selectedElement && selectedElement.isConnected) {
              readLayoutControls();
            } else {
              updateSelectionOverlay();
            }
          }, true);
          doc.defaultView.addEventListener("scroll", updateSelectionOverlay, true);
          doc.defaultView.addEventListener("scroll", () => updateManagedPageFromScroll(doc), true);
          doc.defaultView.addEventListener("resize", updateSelectionOverlay);
          updateStats(editableCount, imageCount);
          renderStatus.textContent = "编辑预览就绪";
        } else {
          previewFrame.style.height = "";
          applyVisualPatchesSoon(doc);
          updateStats(0, doc.images.length);
          renderStatus.textContent = "交互预览就绪";
          window.setTimeout(() => {
            const liveDoc = previewFrame.contentDocument;
            if (liveDoc && liveDoc.images) {
              updateStats(0, liveDoc.images.length);
            }
          }, 240);
        }

        if (!sourceInput.value.trim()) {
          imageStats.classList.add("empty-note");
        } else {
          imageStats.classList.remove("empty-note");
        }
      });

      imagePicker.addEventListener("change", () => {
        const file = imagePicker.files && imagePicker.files[0];
        if (!file) {
          return;
        }
        if (!file.type.startsWith("image/")) {
          showToast("请选择图片文件。", true);
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          if (imagePicker.dataset.mode === "insert" && pendingImageInsert) {
            insertImageElement(reader.result);
            activeImage = null;
            imagePicker.dataset.mode = "";
            return;
          }
          if (!activeImage) {
            imagePicker.dataset.mode = "";
            return;
          }
          pushHistory("替换图片");
          activeImage.setAttribute("src", reader.result);
          recordVisualPatch(activeImage);
          if (selectedElement === activeImage) {
            window.setTimeout(updateSelectionOverlay, 80);
          }
          activeImage = null;
          imagePicker.dataset.mode = "";
          syncSourceFromPreview();
          showToast("图片已替换。");
        };
        reader.onerror = () => {
          activeImage = null;
          pendingImageInsert = null;
          imagePicker.dataset.mode = "";
          showToast("图片替换失败。", true);
        };
        reader.readAsDataURL(file);
      });

      exportButton.addEventListener("click", exportHtml);

      document.addEventListener("keydown", handleEditorKeydown, true);
      templateLibraryButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleTemplateLibrary();
      });
      typographyPresetButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleTypographyPreset();
      });

      textEditOverlay.addEventListener("keydown", (event) => {
        if (!activeTextOverlay) {
          return;
        }
        if (event.key === "Escape") {
          event.preventDefault();
          event.stopPropagation();
          cancelTextOverlay();
          return;
        }
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          event.stopPropagation();
          commitTextOverlay();
        }
      });

      textEditOverlay.addEventListener("input", () => {
        if (!activeTextOverlay) {
          return;
        }
        if (selectedElement === activeTextOverlay.target) {
          layoutControls.text.value = textEditOverlay.value;
        }
      });

      textEditOverlay.addEventListener("blur", () => {
        if (activeTextOverlay) {
          commitTextOverlay();
        }
      });

      window.addEventListener("resize", updateTextOverlayPosition);
      window.addEventListener("scroll", updateTextOverlayPosition, true);

      modeButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setPreviewMode(button.dataset.previewMode);
        });
      });

      Object.values(layoutControls).forEach((control) => {
        control.addEventListener("input", applyLayoutControls);
        control.addEventListener("change", applyLayoutControls);
        control.addEventListener("change", () => {
          activeLayoutHistoryControl = null;
        });
        control.addEventListener("blur", () => {
          activeLayoutHistoryControl = null;
        });
      });

      Object.entries(typographyToggles).forEach(([kind, button]) => {
        button.addEventListener("click", () => {
          toggleTypographyStyle(kind);
        });
      });

      duplicateElement.addEventListener("click", duplicateSelectedElement);

      insertTextBox.addEventListener("click", insertTextBoxElement);

      insertImageBox.addEventListener("click", beginInsertImageElement);

      deleteElement.addEventListener("click", deleteSelectedElement);
      bringToFront.addEventListener("click", () => adjustSelectedLayer("front"));
      bringForward.addEventListener("click", () => adjustSelectedLayer("forward"));
      sendBackward.addEventListener("click", () => adjustSelectedLayer("backward"));
      sendToBack.addEventListener("click", () => adjustSelectedLayer("back"));

      formatPainterButton.addEventListener("click", () => beginFormatPainter("full"));
      formatPainterMenuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        formatPainterMenu.hidden = !formatPainterMenu.hidden;
      });
      formatPainterMenu.addEventListener("click", (event) => {
        const option = event.target && event.target.closest ? event.target.closest("[data-format-painter-mode]") : null;
        if (!option) {
          return;
        }
        event.preventDefault();
        event.stopPropagation();
        beginFormatPainter(option.dataset.formatPainterMode || "full");
      });

      alignLeft.addEventListener("click", () => applyBatchLayout("left"));
      alignCenterX.addEventListener("click", () => applyBatchLayout("centerX"));
      alignRight.addEventListener("click", () => applyBatchLayout("right"));
      alignTop.addEventListener("click", () => applyBatchLayout("top"));
      alignCenterY.addEventListener("click", () => applyBatchLayout("centerY"));
      alignBottom.addEventListener("click", () => applyBatchLayout("bottom"));
      distributeHorizontal.addEventListener("click", () => applyDistribution("x"));
      distributeVertical.addEventListener("click", () => applyDistribution("y"));
      matchWidth.addEventListener("click", () => applyBatchLayout("width"));
      matchHeight.addEventListener("click", () => applyBatchLayout("height"));
      matchSize.addEventListener("click", () => applyBatchLayout("size"));

      selectParent.addEventListener("click", () => {
        if (!selectedElement || !selectedElement.parentElement) {
          return;
        }
        const parent = selectedElement.parentElement;
        if (canSelectElement(parent)) {
          selectElement(parent);
        }
      });

      selectChild.addEventListener("click", () => {
        if (!selectedElement) {
          return;
        }
        const child = [...selectedElement.children].find(canSelectElement);
        if (child) {
          selectElement(child);
        }
      });

      resetLayout.addEventListener("click", resetSelectedLayout);

      closeLayoutPanel.addEventListener("click", () => {
        setLayoutCollapsed(true);
      });

      layoutBubble.addEventListener("click", () => {
        setLayoutCollapsed(false);
        layoutPanel.hidden = false;
      });

      reimportButton.addEventListener("click", () => {
        persistPreviewToSource();
        closeSourceDrawer();
        importTextarea.value = "";
        setImportVisible(true);
      });

      showSourceButton.addEventListener("click", openSourceDrawer);
      closeSourceButton.addEventListener("click", closeSourceDrawer);
      sourceBackdrop.addEventListener("click", closeSourceDrawer);

      applySourceButton.addEventListener("click", () => {
        loadHtmlContent(sourceInput.value, {
          message: "已从源码重新渲染。",
          clearPatches: true
        });
      });

      uploadHtmlButton.addEventListener("click", () => {
        htmlFilePicker.value = "";
        htmlFilePicker.click();
      });

      uploadResourceFolderButton.addEventListener("click", () => {
        resourceFolderPicker.value = "";
        resourceFolderPicker.click();
      });

      importResourceChoiceButton.addEventListener("click", () => {
        importSelectedResourceChoice();
      });

      dropZone.addEventListener("click", (event) => {
        if (event.target.closest("button")) {
          return;
        }
        htmlFilePicker.value = "";
        htmlFilePicker.click();
      });

      ["dragenter", "dragover"].forEach((type) => {
        dropZone.addEventListener(type, (event) => {
          event.preventDefault();
          dropZone.classList.add("is-dragging");
        });
      });

      ["dragleave", "drop"].forEach((type) => {
        dropZone.addEventListener(type, (event) => {
          event.preventDefault();
          dropZone.classList.remove("is-dragging");
        });
      });

      dropZone.addEventListener("drop", (event) => {
        readImportFiles(event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files : []);
      });

      htmlFilePicker.addEventListener("change", () => {
        readImportFiles(htmlFilePicker.files || []);
      });

      resourceFolderPicker.addEventListener("change", () => {
        readImportFiles(resourceFolderPicker.files || []);
      });

      applyImportButton.addEventListener("click", () => {
        loadHtmlContent(importTextarea.value);
      });

      loadIssueTemplateButton.addEventListener("click", () => {
        loadIssueAlignmentTemplate();
      });

      loadSampleButton.addEventListener("click", () => {
        loadHtmlContent(sampleHtml, { message: "已载入示例 HTML。" });
      });

      closeImportButton.addEventListener("click", () => {
        if (hasSourceContent()) {
          setImportVisible(false);
        }
      });

      themeToggle.addEventListener("click", () => {
        const nextIndex = (THEME_MODES.indexOf(currentTheme) + 1) % THEME_MODES.length;
        applyTheme(THEME_MODES[nextIndex]);
      });

      applyTheme(currentTheme);
      localStorage.removeItem(LEGACY_STORAGE_KEY);
      sourceInput.value = "";
      setEditorReady(false);
      setImportVisible(true);
    })();
  </script>
</body>
</html>
